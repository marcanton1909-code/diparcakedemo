<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Galletas Demo</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--dark:#0f172a;--green:#166534;--green-bg:#dcfce7;--amber:#b45309;--amber-bg:#fef3c7;--red:#b91c1c;--red-bg:#fee2e2;--blue:#1d4ed8}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}.container{max-width:1400px;margin:0 auto;padding:16px}.hero{background:linear-gradient(135deg,#0f172a,#334155);color:#fff;border-radius:24px;padding:24px;margin-bottom:16px}.login-wrap{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;min-height:100vh;align-items:center}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .grid{display:grid;gap:16px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-8{grid-template-columns:repeat(8,minmax(0,1fr))}
    .kpi{padding:18px}.kpi .v{font-size:28px;font-weight:700;margin-top:8px}.muted{color:var(--muted)}.tiny{font-size:12px}.label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}.input,.select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;font:inherit}.btn{border:0;background:var(--dark);color:#fff;padding:11px 14px;border-radius:14px;cursor:pointer;font-weight:600}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.danger{background:#dc2626}.btn.sm{padding:8px 10px;font-size:12px}.btn:disabled{opacity:.5;cursor:not-allowed}
    .tabs{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:8px;margin:16px 0}.tab{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center;cursor:pointer;font-weight:600}.tab.active{background:var(--dark);color:#fff}.tab-pane{display:none}.tab-pane.active{display:block}
    table{width:100%;border-collapse:collapse} th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:middle} th{color:var(--muted);font-weight:600}.table-wrap{overflow:auto}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:600}.badge.green{background:var(--green-bg);color:var(--green)}.badge.amber{background:var(--amber-bg);color:var(--amber)}.badge.red{background:var(--red-bg);color:var(--red)}.notice{display:inline-block;background:rgba(34,197,94,.15);padding:10px 14px;border-radius:14px;margin-top:12px}.section-title{font-size:20px;font-weight:700;margin:0 0 12px}.right{text-align:right}.center{text-align:center}.stock-pill{display:inline-block;padding:4px 10px;background:var(--green-bg);color:var(--green);border-radius:999px;font-weight:700}.split{display:grid;grid-template-columns:.82fr 1.18fr;gap:16px}.split-2{display:grid;grid-template-columns:.95fr 1.05fr;gap:16px}
    @media (max-width:1100px){.grid-8,.tabs,.grid-4,.grid-3,.grid-2,.split,.split-2,.login-wrap{grid-template-columns:1fr}}
  </style>
</head>

function today(){ return new Date().toISOString().slice(0,10); }
function currency(v){ return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(v||0); }
function formatDate(v){ return new Intl.DateTimeFormat('es-MX',{dateStyle:'medium'}).format(new Date(v+'T00:00:00')); }
function addDays(dateStr,days){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function daysDiff(endDate){ return Math.ceil((new Date(endDate+'T23:59:59')-new Date())/(1000*60*60*24)); }
function timestampNow(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
function computeRecipeCost(recipe){ return recipe.ingredients.reduce((acc,[name,qty])=>{ const ing=state.ingredients.find(i=>i.name===name); const base=(ing?.unitCost||0)*qty; const override=recipe.ingredientAmountOverrides?.[name]; return acc + (typeof override==='number'?override:base); },0); }
function buildInitialData(){
  return {
    ingredients: deepClone(ingredientCatalog),
    packaging: deepClone(packagingCatalog),
    finishedGoods: recipeData.map(r=>({product:r.outputName,stock:0,salePrice:r.salePrice,theoreticalCost:Number((computeRecipeCostFromLists(r,ingredientCatalog)/r.yieldPerBatch).toFixed(2)),yieldPerBatch:r.yieldPerBatch,shelfLifeDays:r.shelfLifeDays,lastProductionDate:null,nextExpiryDate:null,labelType:r.labelType})),
    customers:[
      {id:1,businessName:'Cliente mostrador',contactName:'Cliente mostrador',email:'cliente@correo.com',phone:'8180000000',orders:0,totalSpent:0},
      {id:2,businessName:'Cafetería Roma',contactName:'María López',email:'compras@cafeteriaroma.com',phone:'8181112233',orders:0,totalSpent:0},
      {id:3,businessName:'Oficina Centro',contactName:'Recepción',email:'recepcion@oficinacentro.com',phone:'8182223344',orders:0,totalSpent:0},
    ],
    movements:[{id:1,date:timestampNow(),type:'Inicial',product:'Sistema',detail:'Inventario inicial configurado',qty:0}],
    savedRemisiones:[],
    recipes:deepClone(recipeData),
    notice:''
  }
}
function computeRecipeCostFromLists(recipe, ingredients){ return recipe.ingredients.reduce((acc,[name,qty])=>acc+((ingredients.find(i=>i.name===name)?.unitCost||0)*qty),0) }
function loadState(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) return JSON.parse(raw); }catch{} return buildInitialData(); }
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function notice(msg){ state.notice=msg; saveState(); renderHeader(); }
function login(){ const u=document.getElementById('loginUser').value.trim(); const p=document.getElementById('loginPass').value; if(u===appUser.username && p===appUser.password){ document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); renderAll(); } else document.getElementById('loginError').textContent='Usuario o contraseña incorrectos'; }
function setupTabs(){ document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{ selectedTab=tab.dataset.tab; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tab)); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id===selectedTab)); }); }
function exportBackup(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='respaldo_saas_galletas.json'; a.click(); }
function resetDemo(){ state=buildInitialData(); selectedEditableRecipeId=state.recipes[0]?.id||''; selectedRecipeId=''; selectedRemisionFolio=''; selectedCustomerId='1'; orderForm={client:'Cliente mostrador',contact:'Cliente mostrador',email:'cliente@correo.com',phone:'8180000000',notes:'',items:[{product:state.finishedGoods[0]?.product||'',qty:1}]}; saveState(); renderAll(); notice('Demo reiniciada.'); }
function exportCsv(rows,filename){ const csv=rows.map(r=>r.map(c=>`"${String(c??'').replaceAll('"','""')}"`).join(',')).join('\n'); const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const win=window.open('','_blank'); if(!win){alert('Tu navegador bloqueó la ventana emergente.');return;} win.document.write(`<html><head><title>${filename}</title></head><body style="font-family:Arial;padding:20px"><h2>${filename}</h2><a href="${url}" download="${filename}" style="display:inline-block;padding:10px 14px;background:#111827;color:#fff;text-decoration:none;border-radius:10px">Descargar</a><pre style="white-space:pre-wrap;margin-top:20px;border:1px solid #ddd;padding:12px">${csv}</pre></body></html>`); win.document.close(); }
function printHtml(html,filename){ const win=window.open('','_blank'); if(!win){alert('Tu navegador bloqueó la ventana emergente para imprimir.');return;} win.document.write(`<html><head><title>${filename}</title></head><body style="font-family:Arial;padding:24px">${html}</body></html>`); win.document.close(); setTimeout(()=>{try{win.focus();win.print();}catch{}},500); }
function renderHeader(){ const n=document.getElementById('notice'); if(!n)return; n.textContent=state.notice||''; n.classList.toggle('hidden',!state.notice); }
function renderKPIs(){ const paid=filteredRemisiones().filter(r=>r.paymentStatus==='paid'); const pending=filteredRemisiones().filter(r=>r.paymentStatus!=='paid'); const totalInsumos=state.ingredients.reduce((a,i)=>a+(i.nonStock?0:i.stock*i.unitCost),0)+state.packaging.reduce((a,i)=>a+i.stock*i.unitCost,0); const totalFinished=state.finishedGoods.reduce((a,i)=>a+i.stock,0); const sales=paid.reduce((a,r)=>a+r.total,0); const pendingTotal=pending.reduce((a,r)=>a+r.total,0); const avg=paid.length?sales/paid.length:0; const totalCost=paid.reduce((a,r)=>a+r.items.reduce((s,i)=>s+(i.cost*i.qty),0),0); const totalProfit=paid.reduce((a,r)=>a+r.items.reduce((s,i)=>s+((i.price-i.cost)*i.qty),0),0); const exp=state.finishedGoods.filter(i=>i.nextExpiryDate && daysDiff(i.nextExpiryDate)<=2).length; const kpis=[['Valor insumos',currency(totalInsumos),'Insumos y etiquetas'],['Producto terminado',`${totalFinished} pzas`,'Existencia disponible'],['Ventas cobradas',currency(sales),'Solo pagado'],['Pendiente por cobrar',currency(pendingTotal),'Remisiones pendientes'],['Costo acumulado',currency(totalCost),'Costo total cobrado'],['Utilidad global',currency(totalProfit),'Solo remisiones pagadas'],['Clientes',state.customers.length,'Base de clientes'],['Por vencer',exp,'Productos con atención']]; document.getElementById('kpis').innerHTML=kpis.map(k=>`<div class="card kpi"><div class="muted tiny">${k[0]}</div><div class="v">${k[1]}</div><div class="tiny muted">${k[2]}</div></div>`).join(''); }
function filteredRemisiones(){ const todayDate=new Date(); return state.savedRemisiones.filter(r=>{ const d=new Date(r.date.replace(' ','T')); if(reportRange==='today') return d.toDateString()===todayDate.toDateString(); if(reportRange==='week') return (todayDate-d)/(1000*60*60*24)<=7; if(reportRange==='month') return d.getMonth()===todayDate.getMonth() && d.getFullYear()===todayDate.getFullYear(); return true; }); }

function renderProduccion(){ const recipeOptions=state.recipes.map(r=>`<option value="${r.id}">${r.outputName}</option>`).join(''); const r=state.recipes.find(x=>x.id===selectedRecipeId); const cost=r?Number((computeRecipeCost(r)/r.yieldPerBatch).toFixed(2)):0; document.getElementById('produccion').innerHTML=`<div class="split"><div class="grid"><div class="card"><div class="section-title">Registrar producción</div><label class="label">Producto / receta</label><select id="prodRecipe" class="select"><option value="">Selecciona una receta</option>${recipeOptions}</select><div class="grid grid-2" style="margin-top:12px"><div><label class="label">Lotes</label><input id="prodBatch" class="input" type="number" min="1" value="${batchCount}"></div><div><label class="label">Fecha elaboración</label><input id="prodDate" class="input" type="date" value="${productionDate}"></div></div><div class="grid grid-2" style="margin-top:12px"><div class="card"><div class="tiny muted">Rendimiento</div><div><b>${r?`${r.yieldPerBatch} pzas/lote`:'—'}</b></div></div><div class="card"><div class="tiny muted">Costo por pieza</div><div><b>${r?currency(cost):'—'}</b></div></div></div><button class="btn" style="width:100%;margin-top:12px" onclick="registerProduction()">Guardar producción</button></div>

function registerProduction(){ const r=state.recipes.find(x=>x.id===selectedRecipeId); if(!r) return; const batches=Math.max(1,Number(batchCount)||1); const reqIng=r.ingredients.map(([name,qty])=>{ const ing=state.ingredients.find(i=>i.name===name); return {name,totalRequired:qty*batches,stock:ing?.nonStock?Infinity:(ing?.stock??0)}; }); const label=state.packaging.find(p=>p.name===r.labelType); const bag=state.packaging.find(p=>p.name==='BOLSA 10X15'); const pieces=r.yieldPerBatch*batches; const reqPack=[{name:'BOLSA 10X15',totalRequired:pieces,stock:bag?.stock??0},{name:r.labelType,totalRequired:pieces*2,stock:label?.stock??0}]; const insufficient=[...reqIng,...reqPack].filter(i=>i.stock<i.totalRequired); if(insufficient.length){alert('No hay inventario suficiente para: '+insufficient.map(i=>i.name).join(', ')); return;} state.ingredients=state.ingredients.map(item=>{ const req=reqIng.find(x=>x.name===item.name); if(!req||item.nonStock) return item; return {...item,stock:Number((item.stock-req.totalRequired).toFixed(2))}; }); state.packaging=state.packaging.map(item=>{ const req=reqPack.find(x=>x.name===item.name); if(!req) return item; const stock=Number((item.stock-req.totalRequired).toFixed(2)); return {...item,stock,value:Number((stock*item.unitCost).toFixed(2))}; }); const expiry=addDays(productionDate,r.shelfLifeDays); state.finishedGoods=state.finishedGoods.map(item=>item.product===r.outputName?{...item,stock:item.stock+pieces,theoreticalCost:Number((computeRecipeCost(r)/r.yieldPerBatch).toFixed(2)),lastProductionDate:productionDate,nextExpiryDate:expiry,labelType:r.labelType}:item); state.movements.unshift({id:state.movements.length+1,date:timestampNow(),type:'Producción',product:r.outputName,detail:`${batches} lote(s) · ${pieces} pzas · elaboración ${productionDate} · vence ${expiry}`,qty:pieces}); saveState(); selectedRecipeId=''; batchCount=1; renderAll(); notice('Producción registrada. Ya se reflejó en reportes.'); }
function registerWaste(){ const qty=Number(wasteForm.qty)||0; const target=state.finishedGoods.find(i=>i.product===wasteForm.productName); if(!target||target.stock<qty){alert('No hay suficiente producto terminado para registrar la merma.'); return;} state.finishedGoods=state.finishedGoods.map(i=>i.product===wasteForm.productName?{...i,stock:i.stock-qty}:i); state.movements.unshift({id:state.movements.length+1,date:timestampNow(),type:'Merma',product:wasteForm.productName,detail:wasteForm.reason||'Merma de producto terminado',qty:-qty}); saveState(); renderAll(); }

function createRecipeTemplate(){ const name=newRecipeMeta.name.trim(); if(!name) return; const parsed=newRecipeRows.filter(r=>r.concept.trim()&&Number(r.quantity)>0).map(r=>[r.concept.trim().toUpperCase(),Number(r.quantity)]); const recipe={id:name.toUpperCase(),outputName:name.toUpperCase(),yieldPerBatch:Number(newRecipeMeta.yieldPerBatch)||1,salePrice:Number(newRecipeMeta.salePrice)||0,shelfLifeDays:Number(newRecipeMeta.shelfLifeDays)||5,labelType:newRecipeMeta.labelType||'ETIQUETA REDONDA',ingredients:parsed,ingredientAmountOverrides:{}}; state.recipes.push(recipe); state.finishedGoods.push({product:recipe.outputName,stock:0,salePrice:recipe.salePrice,theoreticalCost:Number((computeRecipeCost(recipe)/recipe.yieldPerBatch).toFixed(2)),yieldPerBatch:recipe.yieldPerBatch,shelfLifeDays:recipe.shelfLifeDays,lastProductionDate:null,nextExpiryDate:null,labelType:recipe.labelType}); saveState(); selectedEditableRecipeId=recipe.id; newRecipeMeta={name:'',yieldPerBatch:'',salePrice:'',shelfLifeDays:'',labelType:'ETIQUETA REDONDA'}; newRecipeRows=[{concept:'',quantity:''}]; renderAll(); notice('Plantilla de receta creada.'); }

function handlePackagingChange(name,field,val){ const value=Number(val); state.packaging=state.packaging.map(item=>{ if(item.name!==name)return item; const next={...item,[field]:Number.isFinite(value)?value:item[field]}; if(field==='stock'||field==='value'){ const stock=Number(next.stock)||0; const totalValue=Number(next.value??(next.stock*next.unitCost))||0; next.unitCost=stock>0?Number((totalValue/stock).toFixed(4)):0; next.value=Number((stock*next.unitCost).toFixed(2)); } return next;}); saveState(); renderKPIs(); renderInsumos(); }

function renderSalidas(){ document.getElementById('salidas').innerHTML=`<div class="split-2"><div class="card"><div class="section-title">Orden de salida</div><select id="orderCustomer" class="select">${state.customers.map(c=>`<option value="${c.id}">${c.businessName}</option>`).join('')}</select><div class="grid grid-4" style="margin-top:12px"><input id="orderClient" class="input" placeholder="Negocio" value="${orderForm.client}"><input id="orderContact" class="input" placeholder="Contacto" value="${orderForm.contact}"><input id="orderEmail" class="input" placeholder="Correo" value="${orderForm.email}"><input id="orderPhone" class="input" placeholder="Teléfono" value="${orderForm.phone}"></div><div style="margin-top:12px">${orderForm.items.map((item,i)=>{ const stock=state.finishedGoods.find(f=>f.product===item.product)?.stock||0; return `<div class="card" style="margin-bottom:10px"><div class="grid" style="grid-template-columns:1.2fr .5fr .25fr;gap:10px"><div><div class="tiny muted">Producto</div><select class="select" onchange="updateOrderItem(${i},'product',this.value)">${state.finishedGoods.map(f=>`<option value="${f.product}" ${f.product===item.product?'selected':''}>${f.product}</option>`).join('')}</select><div class="tiny muted">Disponible: ${stock} pzas</div></div><div><div class="tiny muted">Piezas</div><input class="input" type="number" min="1" value="${item.qty}" oninput="updateOrderItem(${i},'qty',this.value)"></div><div style="display:flex;align-items:end"><button class="btn secondary" style="width:100%" onclick="removeOrderItem(${i})" ${orderForm.items.length===1?'disabled':''}>X</button></div></div></div>`}).join('')}</div><button class="btn secondary" style="width:100%" onclick="addOrderItem()">Agregar producto</button><textarea id="orderNotes" class="input" style="margin-top:12px;min-height:90px" placeholder="Notas">${orderForm.notes}</textarea><div class="card" style="margin-top:12px"><div class="tiny muted">Total estimado</div><div style="font-size:28px;font-weight:700">${currency(orderForm.items.reduce((a,item)=>a+((state.finishedGoods.find(f=>f.product===item.product)?.salePrice||0)*(Number(item.qty)||0)),0))}</div></div><button class="btn" style="width:100%;margin-top:12px" onclick="generateOrder()">Generar salida y remisión</button></div>
 <div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div class="section-title">Remisión / nota</div><button class="btn secondary" onclick="printSelectedRemision()" ${!selectedRemisionFolio?'disabled':''}>Imprimir / Guardar</button></div>${renderSelectedRemisionBlock()}</div></div>`;
 document.getElementById('orderCustomer').value=selectedCustomerId; document.getElementById('orderCustomer').onchange=e=>{ selectedCustomerId=e.target.value; const c=state.customers.find(x=>String(x.id)===selectedCustomerId); if(c){ orderForm.client=c.businessName; orderForm.contact=c.contactName; orderForm.email=c.email; orderForm.phone=c.phone;} renderSalidas(); };
 document.getElementById('orderClient').oninput=e=>orderForm.client=e.target.value; document.getElementById('orderContact').oninput=e=>orderForm.contact=e.target.value; document.getElementById('orderEmail').oninput=e=>orderForm.email=e.target.value; document.getElementById('orderPhone').oninput=e=>orderForm.phone=e.target.value; document.getElementById('orderNotes').oninput=e=>orderForm.notes=e.target.value; }
function renderSelectedRemisionBlock(){ const rem=state.savedRemisiones.find(r=>r.folio===selectedRemisionFolio); if(!rem) return '<div class="muted">Aquí aparecerá la remisión seleccionada.</div>'; return `<div class="card"><div style="display:flex;justify-content:space-between;gap:10px"><div><h3 style="margin:0">Remisión ${rem.folio}</h3><div class="tiny muted">Fecha: ${rem.date}</div></div><span class="badge ${rem.paymentStatus==='paid'?'green':'amber'}">${rem.paymentStatus==='paid'?'Pagado':'Pendiente'}</span></div><div class="grid grid-2" style="margin-top:12px"><div class="card"><div class="tiny muted">Cliente</div><div><b>${rem.client}</b></div><div class="tiny muted">${rem.contact}</div><div class="tiny muted">${rem.email}</div><div class="tiny muted">${rem.phone}</div></div><div class="card"><div class="tiny muted">Notas</div><div>${rem.notes||'Sin notas'}</div></div></div><div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Producto</th><th>Pzas</th><th>Etiqueta receta</th><th>Precio</th><th class="right">Subtotal</th></tr></thead><tbody>${rem.items.map(i=>`<tr><td>${i.product}</td><td>${i.qty}</td><td>${i.labelType}</td><td>${currency(i.price)}</td><td class="right">${currency(i.subtotal)}</td></tr>`).join('')}</tbody></table></div><div class="right" style="margin-top:12px"><span class="card" style="display:inline-block;background:#0f172a;color:#fff"><div class="tiny" style="color:#cbd5e1">Total</div><div style="font-size:28px;font-weight:700">${currency(rem.total)}</div></span></div></div>`; }
function addOrderItem(){ orderForm.items.push({product:state.finishedGoods[0]?.product||'',qty:1}); renderSalidas(); }
function updateOrderItem(i,field,val){ orderForm.items[i][field]=field==='qty'?Number(val)||0:val; renderSalidas(); }
function removeOrderItem(i){ if(orderForm.items.length===1)return; orderForm.items.splice(i,1); renderSalidas(); }
function generateOrder(){ const invalid=orderForm.items.filter(item=>{ const stock=state.finishedGoods.find(f=>f.product===item.product)?.stock||0; return !item.product || (Number(item.qty)||0)<=0 || stock<Number(item.qty); }); if(invalid.length){alert('Revisa las cantidades. Hay productos sin stock suficiente o líneas inválidas.'); return;} const rem={ folio:`REM-${Date.now().toString().slice(-6)}`, date:timestampNow(), client:orderForm.client, contact:orderForm.contact, email:orderForm.email, phone:orderForm.phone, customerId:Number(selectedCustomerId), notes:orderForm.notes, paymentStatus:'pending', items:orderForm.items.map(item=>{ const found=state.finishedGoods.find(f=>f.product===item.product); const qty=Number(item.qty||0); return { ...item, price:found?.salePrice||0, subtotal:(found?.salePrice||0)*qty, expiry:found?.nextExpiryDate, elaboration:found?.lastProductionDate, cost:found?.theoreticalCost||0, labelType:found?.labelType||'N/D' }; }), total:orderForm.items.reduce((a,item)=>a+((state.finishedGoods.find(f=>f.product===item.product)?.salePrice||0)*(Number(item.qty)||0)),0)}; state.finishedGoods=state.finishedGoods.map(fg=>{ const line=orderForm.items.find(i=>i.product===fg.product); return line?{...fg,stock:fg.stock-Number(line.qty)}:fg; }); state.savedRemisiones.unshift(rem); state.customers=state.customers.map(c=>c.id===Number(selectedCustomerId)?{...c,orders:c.orders+1,email:orderForm.email,phone:orderForm.phone,businessName:orderForm.client,contactName:orderForm.contact}:c); orderForm.items.forEach(item=>state.movements.unshift({id:state.movements.length+1,date:timestampNow(),type:'Salida venta',product:item.product,detail:`Remisión ${rem.folio} · ${orderForm.client}`,qty:-Number(item.qty)})); selectedRemisionFolio=rem.folio; orderForm={client:'',contact:'',email:'',phone:'',notes:'',items:[{product:state.finishedGoods[0]?.product||'',qty:1}]}; selectedCustomerId='1'; saveState(); renderAll(); notice('Salida registrada y remisión generada.'); }
function printSelectedRemision(){ const rem=state.savedRemisiones.find(r=>r.folio===selectedRemisionFolio); if(!rem) return; printHtml(renderRemisionHtml(rem), rem.folio); }
function renderRemisionHtml(rem){ const rows=rem.items.map(i=>`<tr><td style="border:1px solid #ddd;padding:8px">${i.product}</td><td style="border:1px solid #ddd;padding:8px">${i.qty}</td><td style="border:1px solid #ddd;padding:8px">${i.labelType}</td><td style="border:1px solid #ddd;padding:8px">${currency(i.price)}</td><td style="border:1px solid #ddd;padding:8px">${currency(i.subtotal)}</td></tr>`).join(''); return `<h2>Remisión ${rem.folio}</h2><p>Fecha: ${rem.date}</p><p>Cliente: ${rem.client}</p><p>Contacto: ${rem.contact||''}</p><p>Correo: ${rem.email}</p><p>Teléfono: ${rem.phone}</p><p>Estatus: ${rem.paymentStatus==='paid'?'Pagado':'Pendiente'}</p><table style="border-collapse:collapse;width:100%;margin-top:16px"><thead><tr><th style="border:1px solid #ddd;padding:8px">Producto</th><th style="border:1px solid #ddd;padding:8px">Pzas</th><th style="border:1px solid #ddd;padding:8px">Etiqueta</th><th style="border:1px solid #ddd;padding:8px">Precio</th><th style="border:1px solid #ddd;padding:8px">Subtotal</th></tr></thead><tbody>${rows}</tbody></table><h3 style="margin-top:16px">Total: ${currency(rem.total)}</h3>`; }
function renderRemisiones(){ document.getElementById('remisiones').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div class="section-title">Historial de remisiones</div><button class="btn secondary" onclick="exportSales()">Exportar ventas</button></div>${state.savedRemisiones.length?`<div class="table-wrap"><table><thead><tr><th>Ver</th><th>Folio</th><th>Fecha</th><th>Cliente</th><th>Estatus</th><th>Total</th></tr></thead><tbody>${state.savedRemisiones.map(r=>`<tr><td><button class="btn secondary sm" onclick="openRemisionView('${r.folio}')">Ver</button></td><td><b>${r.folio}</b></td><td>${r.date}</td><td>${r.client}</td><td>${r.paymentStatus==='paid'?'Pagado':'Pendiente'}</td><td>${currency(r.total)}</td></tr>`).join('')}</tbody></table></div>`:`<div class="muted">Aún no hay remisiones guardadas.</div>`}</div>`; }
function openRemisionView(folio){ selectedRemisionFolio=folio; const rem=state.savedRemisiones.find(r=>r.folio===folio); if(!rem)return; const win=window.open('','_blank'); if(!win){alert('Tu navegador bloqueó la ventana emergente.');return;} win.document.write(`<html><head><title>${rem.folio}</title></head><body style="font-family:Arial;padding:24px">${renderRemisionHtml(rem)}</body></html>`); win.document.close(); notice(`Remisión ${rem.folio} abierta.`); }
function renderClientes(){ document.getElementById('clientes').innerHTML=`<div class="split"><div class="card"><div class="section-title">Nuevo cliente</div><input id="cliBiz" class="input" placeholder="Nombre de negocio" value="${newCustomerForm.businessName}"><input id="cliContact" class="input" placeholder="Nombre de contacto" value="${newCustomerForm.contactName}" style="margin-top:12px"><input id="cliEmail" class="input" placeholder="Correo" value="${newCustomerForm.email}" style="margin-top:12px"><input id="cliPhone" class="input" placeholder="Teléfono" value="${newCustomerForm.phone}" style="margin-top:12px"><button class="btn" style="width:100%;margin-top:12px" onclick="addCustomer()">Agregar cliente</button></div><div class="card"><div class="section-title">Clientes frecuentes</div><div class="table-wrap"><table><thead><tr><th>Negocio</th><th>Contacto</th><th>Correo</th><th>Teléfono</th><th>Pedidos</th><th class="right">Total cobrado</th></tr></thead><tbody>${state.customers.map(c=>`<tr><td><b>${c.businessName}</b></td><td>${c.contactName}</td><td>${c.email}</td><td>${c.phone}</td><td>${c.orders}</td><td class="right">${currency(c.totalSpent)}</td></tr>`).join('')}</tbody></table></div></div></div>`; document.getElementById('cliBiz').oninput=e=>newCustomerForm.businessName=e.target.value; document.getElementById('cliContact').oninput=e=>newCustomerForm.contactName=e.target.value; document.getElementById('cliEmail').oninput=e=>newCustomerForm.email=e.target.value; document.getElementById('cliPhone').oninput=e=>newCustomerForm.phone=e.target.value; }
function renderCobranza(){ document.getElementById('cobranza').innerHTML=`<div class="card"><div class="section-title">Control de cobranza</div><div class="table-wrap"><table><thead><tr><th>Folio</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estatus</th><th class="right">Acción</th></tr></thead><tbody>${state.savedRemisiones.map(r=>`<tr><td>${r.folio}</td><td>${r.client}</td><td>${r.date}</td><td>${currency(r.total)}</td><td>${r.paymentStatus==='paid'?'<span class="badge green">Pagado</span>':'<span class="badge amber">Pendiente</span>'}</td><td class="right">${r.paymentStatus==='paid'?`<button class="btn secondary sm" onclick="markStatus('${r.folio}','pending')">Marcar pendiente</button>`:`<button class="btn sm" onclick="markStatus('${r.folio}','paid')">Marcar pagado</button>`}</td></tr>`).join('')}</tbody></table></div></div>`; }
function markStatus(folio,status){ const target=state.savedRemisiones.find(r=>r.folio===folio); state.savedRemisiones=state.savedRemisiones.map(r=>r.folio===folio?{...r,paymentStatus:status}:r); if(status==='paid' && target && target.paymentStatus!=='paid'){ state.customers=state.customers.map(c=>c.id===target.customerId?{...c,totalSpent:c.totalSpent+target.total}:c); } saveState(); renderAll(); notice(`Cobranza actualizada a ${status==='paid'?'pagado':'pendiente'}.`); }
function renderReportes(){ document.getElementById('reportes').innerHTML=`<div class="grid grid-3"><button class="btn secondary" onclick="exportSales()">Ver ventas</button><button class="btn secondary" onclick="exportInventory()">Ver inventario</button><button class="btn secondary" onclick="exportCustomers()">Ver clientes</button></div><div class="card" style="margin-top:16px"><div class="section-title">Inventario de producto terminado</div><div class="table-wrap"><table><thead><tr><th>Producto</th><th>Stock</th><th>Costo unitario</th><th class="right">Valor</th></tr></thead><tbody>${state.finishedGoods.map(i=>`<tr><td><b>${i.product}</b></td><td><span class="stock-pill">${i.stock}</span></td><td>${currency(i.theoreticalCost)}</td><td class="right">${currency(i.stock*i.theoreticalCost)}</td></tr>`).join('')}</tbody></table></div></div>`; }
function exportSales(){ const rows=[['Folio','Fecha','Cliente','Estatus','Productos','Piezas','Total'],...filteredRemisiones().map(r=>[r.folio,r.date,r.client,r.paymentStatus,r.items.map(i=>i.product).join(' | '),r.items.reduce((s,i)=>s+Number(i.qty),0),r.total])]; exportCsv(rows,'reporte_ventas.csv'); }
function exportInventory(){ const rows=[['Tipo','Nombre','Stock','Costo unitario','Valor'],...state.ingredients.filter(i=>!i.nonStock).map(i=>['Insumo',i.name,i.stock,i.unitCost,Number((i.stock*i.unitCost).toFixed(2))]),...state.packaging.map(i=>['Etiqueta / bolsa',i.name,i.stock,i.unitCost,Number((i.stock*i.unitCost).toFixed(2))]),...state.finishedGoods.map(f=>['Producto terminado',f.product,f.stock,f.theoreticalCost,Number((f.stock*f.theoreticalCost).toFixed(2))])]; exportCsv(rows,'reporte_inventario.csv'); }
function exportCustomers(){ const rows=[['Negocio','Contacto','Correo','Teléfono','Pedidos','Total cobrado'],...state.customers.map(c=>[c.businessName,c.contactName,c.email,c.phone,c.orders,c.totalSpent])]; exportCsv(rows,'clientes.csv'); }
function renderRecetas(){ const recipe=state.recipes.find(r=>r.id===selectedEditableRecipeId)||state.recipes[0]; document.getElementById('recetas').innerHTML=`<div class="split"><div class="card"><div class="section-title">Editar costos por receta</div><label class="label">Receta</label><select id="editRecipeSel" class="select">${state.recipes.map(r=>`<option value="${r.id}">${r.outputName}</option>`).join('')}</select><div class="card" style="margin-top:12px"><div class="tiny muted">Costo teórico actual por lote</div><div style="font-size:28px;font-weight:700">${currency(computeRecipeCost(recipe))}</div><div class="tiny muted">El costo base del insumo se actualiza desde Insumos. Aquí solo puedes ajustar el importe del renglón en casos excepcionales.</div></div></div><div class="card"><div class="section-title">Insumos de la receta</div><div class="table-wrap"><table><thead><tr><th>Insumo</th><th>Cantidad</th><th>Costo base</th><th>Importe editable</th><th class="right">Importe</th></tr></thead><tbody>${recipe.ingredients.map(([name,qty])=>{ const base=state.ingredients.find(i=>i.name===name)?.unitCost||0; const override=recipe.ingredientAmountOverrides?.[name]; const applied=typeof override==='number'?override:(base*qty); return `<tr><td><b>${name}</b></td><td>${qty}</td><td>${currency(base)}</td><td><input class="input" type="number" step="0.0001" value="${applied}" oninput="updateRecipeOverride('${recipe.id}','${name.replaceAll("'","\\'")}',this.value)"></td><td class="right">${currency(applied)}</td></tr>`; }).join('')}</tbody></table></div></div></div>`; document.getElementById('editRecipeSel').value=selectedEditableRecipeId; document.getElementById('editRecipeSel').onchange=e=>{ selectedEditableRecipeId=e.target.value; renderRecetas(); }; }
function updateRecipeOverride(recipeId,ingredientName,newAmount){ const parsed=Number(newAmount); state.recipes=state.recipes.map(recipe=>{ if(recipe.id!==recipeId) return recipe; return {...recipe, ingredientAmountOverrides:{...(recipe.ingredientAmountOverrides||{}), [ingredientName]:Number.isFinite(parsed)?parsed:0}}; }); const target=state.recipes.find(r=>r.id===recipeId); state.finishedGoods=state.finishedGoods.map(item=>item.product===target.outputName?{...item,theoreticalCost:Number((computeRecipeCost(target)/target.yieldPerBatch).toFixed(2))}:item); saveState(); renderRecetas(); renderKPIs(); renderReportes(); notice('Importe del insumo en receta actualizado.'); }
function renderAll(){ renderHeader(); renderKPIs(); renderDashboard(); renderProduccion(); renderInsumos(); renderSalidas(); renderRemisiones(); renderClientes(); renderCobranza(); renderReportes(); renderRecetas(); }

setupTabs();
document.getElementById('importJson').addEventListener('change', e=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ try{ const parsed=JSON.parse(String(reader.result)); state=parsed; saveState(); renderAll(); notice('Respaldo importado correctamente.'); }catch{ alert('No fue posible leer el respaldo.'); } }; reader.readAsText(file); e.target.value=''; });
</script>
</body>
</html>
