function calc(){const lowStock=state.ingredients.filter(i=>i.stock<=i.reorderPoint&&i.reorderPoint>0); const lowPkg=state.packaging.filter(i=>i.stock<=i.reorderPoint&&i.reorderPoint>0); const nearExpiry=state.finishedGoods.filter(i=>i.nextExpiryDate&&ddiff(i.nextExpiryDate)<=2); const totalFinishedUnits=state.finishedGoods.reduce((a,b)=>a+b.stock,0); const totalInsumosValue=state.ingredients.reduce((a,b)=>a+b.stock*b.unitCost,0)+state.packaging.reduce((a,b)=>a+b.stock*b.unitCost,0); const now=new Date(); const filtered=state.savedRemisiones.filter(r=>{const d=new Date(r.date.replace(' ','T')); if(state.reportRange==='today') return d.toDateString()===now.toDateString(); if(state.reportRange==='week') return (now-d)/(1000*60*60*24)<=7; if(state.reportRange==='month') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); return true;}); const paid=filtered.filter(r=>r.paymentStatus==='paid'); const pending=filtered.filter(r=>r.paymentStatus!=='paid'); const totalSales=paid.reduce((a,b)=>a+b.total,0); const pendingCollect=pending.reduce((a,b)=>a+b.total,0); const avgTicket=paid.length?totalSales/paid.length:0; const totalCost=paid.reduce((a,r)=>a+r.items.reduce((s,i)=>s+((i.cost||0)*Number(i.qty||0)),0),0); const totalProfit=paid.reduce((a,r)=>a+r.items.reduce((s,i)=>s+(((i.price||0)-(i.cost||0))*Number(i.qty||0)),0),0); const salesByProduct=state.finishedGoods.map(f=>{const items=paid.flatMap(r=>r.items.filter(i=>i.product===f.product)); const qty=items.reduce((a,b)=>a+Number(b.qty||0),0); const cost=items.reduce((a,b)=>a+((b.cost||0)*Number(b.qty||0)),0); const rev=items.reduce((a,b)=>a+((b.price||0)*Number(b.qty||0)),0); return {product:f.product,qty,costAccumulated:cost,revenueAccumulated:rev,profitAccumulated:rev-cost};}).filter(x=>x.qty>0).sort((a,b)=>b.qty-a.qty).slice(0,6); return {lowStock,lowPkg,nearExpiry,totalFinishedUnits,totalInsumosValue,filtered,paid,pending,totalSales,pendingCollect,avgTicket,totalCost,totalProfit,salesByProduct};}

function mainView(){const d=calc(); return `<div class="container"><div class="hero"><div><div class="small" style="color:#cbd5e1;">SaaS de control de elaboración de galletas</div><h1>Demo de operación</h1>${state.notice?`<div class="notice">${state.notice}</div>`:''}</div><div class="hero-actions"><button class="secondary" id="backupBtn">Respaldo</button><label class="secondary" style="display:inline-flex;align-items:center;gap:8px;padding:12px 16px;border-radius:14px;cursor:pointer;"><input type="file" id="importBackup" accept="application/json" style="display:none;">Importar</label><button class="secondary" id="resetBtn">Reiniciar</button></div></div><div class="grid kpis">${kpi('Valor insumos',money(d.totalInsumosValue),'Insumos y etiquetas')}${kpi('Producto terminado',`${d.totalFinishedUnits} pzas`,'Existencia disponible')}${kpi('Ventas cobradas',money(d.totalSales),'Solo pagado')}${kpi('Pendiente por cobrar',money(d.pendingCollect),'Remisiones pendientes')}${kpi('Costo acumulado',money(d.totalCost),'Costo total cobrado')}${kpi('Utilidad global',money(d.totalProfit),'Solo remisiones pagadas')}${kpi('Clientes',String(state.customers.length),'Base de clientes')}${kpi('Por vencer',String(d.nearExpiry.length),'Productos con atención')}</div><div class="tabs">${tabBtn('dashboard','Dashboard')}${tabBtn('produccion','Producción')}${tabBtn('insumos','Insumos')}${tabBtn('salidas','Salidas')}${tabBtn('remisiones','Remisiones')}${tabBtn('clientes','Clientes')}${tabBtn('cobranza','Cobranza')}${tabBtn('reportes','Reportes')}</div><div class="pane ${state.activeTab==='dashboard'?'active':''}">${dashboardView(d)}</div><div class="pane ${state.activeTab==='produccion'?'active':''}">${productionView()}</div><div class="pane ${state.activeTab==='insumos'?'active':''}">${insumosView()}</div><div class="pane ${state.activeTab==='salidas'?'active':''}">${salidasView()}</div><div class="pane ${state.activeTab==='remisiones'?'active':''}">${remisionesView()}</div><div class="pane ${state.activeTab==='clientes'?'active':''}">${clientesView()}</div><div class="pane ${state.activeTab==='cobranza'?'active':''}">${cobranzaView()}</div><div class="pane ${state.activeTab==='reportes'?'active':''}">${reportesView()}</div></div>`}
function dashboardView(d){return `<div class="stack"><div class="section-2"><div class="card"><h3>Costos y utilidad acumulada por producto</h3><div class="stack">${d.salesByProduct.length?d.salesByProduct.map(i=>`<div class="lite"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;"><div><strong>${i.product}</strong><div class="small muted">${i.qty} pzas cobradas</div></div><span class="badge">${money(i.profitAccumulated)}</span></div><div class="form-3" style="margin-top:10px;"><div class="lite"><div class="small muted">Venta acumulada</div><div><strong>${money(i.revenueAccumulated)}</strong></div></div><div class="lite"><div class="small muted">Costo acumulado</div><div><strong>${money(i.costAccumulated)}</strong></div></div><div class="lite"><div class="small muted">Utilidad acumulada</div><div><strong>${money(i.profitAccumulated)}</strong></div></div></div></div>`).join(''):'<div class="empty">Aún no hay ventas cobradas para el periodo seleccionado.</div>'}</div></div><div class="stack"><div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;"><h3>Ventas por periodo</h3><select id="reportRange"><option value="all" ${state.reportRange==='all'?'selected':''}>Todo</option><option value="today" ${state.reportRange==='today'?'selected':''}>Hoy</option><option value="week" ${state.reportRange==='week'?'selected':''}>7 días</option><option value="month" ${state.reportRange==='month'?'selected':''}>Mes</option></select></div><div class="form-4"><div class="lite"><div class="small muted">Remisiones</div><div><strong>${d.filtered.length}</strong></div></div><div class="lite"><div class="small muted">Cobradas</div><div><strong>${d.paid.length}</strong></div></div><div class="lite"><div class="small muted">Pendientes</div><div><strong>${d.pending.length}</strong></div></div><div class="lite"><div class="small muted">Ticket promedio</div><div><strong>${money(d.avgTicket)}</strong></div></div></div></div><div class="card"><h3>Alertas</h3><div class="stack">${d.nearExpiry.slice(0,2).map(i=>`<div class="lite"><strong>${i.product}</strong><div class="small muted">Vence: ${i.nextExpiryDate?fmtDate(i.nextExpiryDate):'N/D'}</div></div>`).join('')}${d.lowStock.slice(0,2).map(i=>`<div class="lite"><strong>${i.name}</strong><div class="small muted">Stock bajo: ${i.stock} ${i.unitBase}</div></div>`).join('')}${d.lowPkg.slice(0,2).map(i=>`<div class="lite"><strong>${i.name}</strong><div class="small muted">Stock bajo: ${i.stock} ${i.unitBase}</div></div>`).join('')||''}${!d.nearExpiry.length&&!d.lowStock.length&&!d.lowPkg.length?'<div class="empty">Sin alertas importantes.</div>':''}</div></div></div></div><div class="card"><h3>Últimos movimientos</h3><div class="scroll"><table><thead><tr><th>Fecha</th><th>Tipo</th><th>Producto</th><th>Detalle</th><th>Cantidad</th></tr></thead><tbody>${state.movements.slice(0,10).map(m=>`<tr><td>${m.date}</td><td>${m.type}</td><td>${m.product}</td><td>${m.detail}</td><td>${m.qty}</td></tr>`).join('')}</tbody></table></div></div></div>`}
function productionView(){const recipe=state.recipes.find(r=>r.id===ui.selectedRecipeId); return `<div class="section-3"><div class="stack"><div class="card"><h3>Registrar producción</h3><div class="stack"><div><label>Producto / receta</label><select id="prodRecipe"><option value="">Selecciona una receta</option>${state.recipes.map(r=>`<option value="${r.id}" ${ui.selectedRecipeId===r.id?'selected':''}>${r.outputName}</option>`).join('')}</select></div><div class="form-2"><div><label>Lotes</label><input id="prodLots" type="number" min="1" value="${ui.batchCount}"></div><div><label>Fecha elaboración</label><input id="prodDate" type="date" value="${ui.productionDate}"></div></div><div class="form-2"><div class="lite"><div class="small muted">Rendimiento</div><div><strong>${recipe?recipe.yieldPerBatch+' pzas/lote':'—'}</strong></div></div><div class="lite"><div class="small muted">Costo por pieza</div><div><strong>${recipe?money(Number((recipeCost(recipe,state.ingredients)/recipe.yieldPerBatch).toFixed(2))):'—'}</strong></div></div></div><button id="saveProductionBtn">Guardar producción</button></div></div><div class="card"><h3>Nueva plantilla de receta</h3><div class="stack"><div class="form-4"><input id="recipeName" placeholder="Nombre del producto" value="${ui.recipeName}"><input id="recipeYield" type="number" placeholder="Rendimiento por lote" value="${ui.recipeYield}"><input id="recipeSale" type="number" placeholder="Precio venta" value="${ui.recipeSale}"><input id="recipeShelf" type="number" placeholder="Vida útil días" value="${ui.recipeShelf}"></div><div><label>Etiqueta que utiliza la receta</label><select id="recipeLabel">${state.packaging.filter(p=>p.name!=='BOLSA STANDARD').map(p=>`<option value="${p.name}" ${ui.recipeLabel===p.name?'selected':''}>${p.name}</option>`).join('')}</select></div><div class="scroll"><table><thead><tr><th>Concepto</th><th>Cantidad</th><th>Stock actual</th><th>Costo</th><th></th></tr></thead><tbody>${ui.recipeRows.map((row,idx)=>{const ing=state.ingredients.find(i=>i.name===String(row.concept||'').trim().toUpperCase());const qty=Number(row.quantity||0);return `<tr><td><input data-rconcept="${idx}" value="${row.concept||''}" placeholder="Insumo"></td><td><input data-rqty="${idx}" type="number" value="${row.quantity||''}" placeholder="Cantidad"></td><td>${ing?ing.stock:'—'}</td><td>${ing?money((ing.unitCost||0)*qty):'—'}</td><td><button class="secondary small" data-rdel="${idx}">X</button></td></tr>`}).join('')}</tbody></table></div><button class="secondary" id="addRecipeRowBtn">Agregar renglón</button><button id="saveRecipeBtn">Crear plantilla de receta</button></div></div><div class="card"><h3>Registrar merma</h3><div class="stack"><select id="wasteProduct">${state.finishedGoods.map(f=>`<option value="${f.product}" ${ui.wasteProduct===f.product?'selected':''}>${f.product}</option>`).join('')}</select><div class="form-2"><input id="wasteQty" type="number" min="1" value="${ui.wasteQty}"><input id="wasteReason" value="${ui.wasteReason}"></div><button class="danger" id="saveWasteBtn">Descontar merma</button></div></div></div><div class="card"><h3>Consumo estimado de insumos</h3>${!recipe?'<div class="empty">Selecciona un producto para ver el consumo estimado.</div>':`<div class="scroll"><table><thead><tr><th>Concepto</th><th>Cantidad</th><th>Stock actual</th><th>Costo</th></tr></thead><tbody>${recipe.ingredients.map(([n,q])=>{const ing=state.ingredients.find(i=>i.name===n); return `<tr><td>${n}</td><td>${q}</td><td>${ing?ing.stock:0}</td><td>${money((ing?.unitCost||0)*q)}</td></tr>`}).join('')}<tr><td>BOLSA STANDARD</td><td>${recipe.yieldPerBatch}</td><td>${state.packaging.find(p=>p.name==='BOLSA STANDARD')?.stock||0}</td><td>${money((state.packaging.find(p=>p.name==='BOLSA STANDARD')?.unitCost||0)*recipe.yieldPerBatch)}</td></tr><tr><td>${recipe.labelType}</td><td>${recipe.yieldPerBatch*2}</td><td>${state.packaging.find(p=>p.name===recipe.labelType)?.stock||0}</td><td>${money((state.packaging.find(p=>p.name===recipe.labelType)?.unitCost||0)*recipe.yieldPerBatch*2)}</td></tr></tbody></table></div>`}</div></div>`}
function insumosView(){const filtered=state.ingredients.filter(i=>i.name.toLowerCase().includes(ui.searchIngredient.toLowerCase())); return `<div class="section-3"><div class="stack"><div class="card"><h3>Entrada de insumos</h3><div class="stack"><select id="entryIngredient">${state.ingredients.map(i=>`<option value="${i.name}" ${ui.entryIngredient===i.name?'selected':''}>${i.name}</option>`).join('')}</select><input id="entryQty" type="number" min="0" value="${ui.entryQty}" placeholder="Cantidad"><input id="entryTotalCost" type="number" min="0" step="0.01" value="${ui.entryTotalCost}" placeholder="Costo total de la entrada"><input id="entryNote" value="${ui.entryNote}" placeholder="Concepto"><button id="entrySaveBtn">Registrar entrada</button></div></div><div class="card"><h3>Inventario de etiquetas y bolsas</h3><div class="stack"><div class="form-4"><input id="pkgName" placeholder="Nombre" value="${ui.pkgName}"><input id="pkgStock" type="number" placeholder="Stock" value="${ui.pkgStock}"><input id="pkgCost" type="number" placeholder="Costo unitario" value="${ui.pkgCost}"><input id="pkgMin" type="number" placeholder="Mínimo" value="${ui.pkgMin}"></div><button class="secondary" id="addPackagingBtn">Agregar etiqueta o bolsa</button><table><thead><tr><th>Insumo</th><th>Stock</th><th>Costo</th><th>Valor</th><th>Acción</th></tr></thead><tbody>${state.packaging.map(p=>`<tr><td>${p.name}</td><td><input data-pstock="${p.id}" type="number" value="${p.stock}"></td><td><input data-pcost="${p.id}" type="number" value="${p.unitCost}"></td><td>${money(p.stock*p.unitCost)}</td><td><button class="secondary small" data-pdel="${p.id}">Eliminar</button></td></tr>`).join('')}</tbody></table></div></div></div><div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;"><h3>Inventario de insumos</h3><input id="ingredientSearch" placeholder="Buscar insumo..." value="${ui.searchIngredient}" style="max-width:260px"></div><div class="scroll"><table><thead><tr><th>Código</th><th>Insumo</th><th>Unidad</th><th>Stock</th><th>Mínimo</th><th>Costo unitario</th><th>Valor</th></tr></thead><tbody>${filtered.map(i=>`<tr><td>${i.code}</td><td><strong>${i.name}</strong></td><td>${i.unitBase}</td><td><input data-istock="${i.name}" type="number" value="${i.stock}"></td><td>${i.reorderPoint}</td><td><input data-icost="${i.name}" type="number" value="${i.unitCost}"></td><td>${money(i.stock*i.unitCost)}</td></tr>`).join('')}</tbody></table></div></div></div>`}
function salidasView(){const total=ui.orderItems.reduce((a,it)=>a+((state.finishedGoods.find(f=>f.product===it.product)?.salePrice||0)*Number(it.qty||0)),0); return `<div class="section-3"><div class="card"><h3>Orden de salida</h3><div class="stack"><select id="selectedCustomer">${state.customers.map(c=>`<option value="${c.id}" ${ui.selectedCustomerId===String(c.id)?'selected':''}>${c.businessName}</option>`).join('')}</select><div class="form-4"><input id="orderClient" placeholder="Negocio" value="${ui.orderClient}"><input id="orderContact" placeholder="Contacto" value="${ui.orderContact}"><input id="orderEmail" placeholder="Correo" value="${ui.orderEmail}"><input id="orderPhone" placeholder="Teléfono" value="${ui.orderPhone}"></div><div class="stack">${ui.orderItems.map((it,idx)=>{const stock=state.finishedGoods.find(f=>f.product===it.product)?.stock||0; return `<div class="form-3" style="grid-template-columns:1.2fr .5fr .2fr;border:1px solid var(--border);border-radius:18px;padding:14px;"><div><label>Producto</label><select data-oprod="${idx}">${state.finishedGoods.map(f=>`<option value="${f.product}" ${it.product===f.product?'selected':''}>${f.product}</option>`).join('')}</select><div class="small muted">Disponible: ${stock} pzas</div></div><div><label>Piezas</label><input data-oqty="${idx}" type="number" min="1" value="${it.qty}"></div><div style="display:flex;align-items:end;"><button class="secondary" data-odel="${idx}" ${ui.orderItems.length===1?'disabled':''}>X</button></div></div>`}).join('')}</div><button class="secondary" id="addOrderLineBtn">Agregar producto</button><textarea id="orderNotes" placeholder="Notas">${ui.orderNotes}</textarea><div class="lite"><div class="small muted">Total estimado</div><div style="font-size:28px;font-weight:700;">${money(total)}</div></div><button id="generateOrderBtn">Generar salida y remisión</button></div></div><div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;"><h3>Remisión / nota</h3><button class="secondary" id="printRemisionBtn" ${!state.selectedRemision?'disabled':''}>Imprimir / Guardar</button></div>${!state.selectedRemision?'<div class="empty">Aquí aparecerá la remisión seleccionada.</div>':remisionPreview(state.selectedRemision)}</div></div>`}
function remisionPreview(r){return `<div><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;"><div><h3 style="margin:0;">Remisión ${r.folio}</h3><div class="muted">Fecha: ${r.date}</div></div><span class="badge ${r.paymentStatus==='paid'?'green':'amber'}">${r.paymentStatus==='paid'?'Pagado':'Pendiente'}</span></div><div class="form-2" style="margin-top:16px;"><div class="lite"><div class="small muted">Cliente</div><div><strong>${r.client}</strong></div><div class="small muted">${r.contact||''}</div><div class="small muted">${r.email||''}</div><div class="small muted">${r.phone||''}</div></div><div class="lite"><div class="small muted">Notas</div><div>${r.notes||'Sin notas'}</div></div></div><div class="scroll" style="margin-top:16px;"><table><thead><tr><th>Producto</th><th>Pzas</th><th>Etiqueta receta</th><th>Precio</th><th>Subtotal</th></tr></thead><tbody>${r.items.map(i=>`<tr><td>${i.product}</td><td>${i.qty}</td><td>${i.labelType}</td><td>${money(i.price)}</td><td>${money(i.subtotal)}</td></tr>`).join('')}</tbody></table></div><div style="display:flex;justify-content:flex-end;margin-top:16px;"><div class="box" style="background:#0f172a;color:#fff;"><div class="small" style="color:#cbd5e1;">Total</div><div style="font-size:28px;font-weight:700;">${money(r.total)}</div></div></div></div>`}
function remisionesView(){return `<div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center;"><h3>Historial de remisiones</h3><button class="secondary" id="reportSalesBtn">Exportar ventas</button></div>${!state.savedRemisiones.length?'<div class="empty">Aún no hay remisiones guardadas.</div>':`<div class="scroll"><table><thead><tr><th>Ver</th><th>Folio</th><th>Fecha</th><th>Cliente</th><th>Estatus</th><th>Total</th></tr></thead><tbody>${state.savedRemisiones.map(r=>`<tr><td><button class="secondary small" data-rview="${r.folio}">Ver</button></td><td><strong>${r.folio}</strong></td><td>${r.date}</td><td>${r.client}</td><td>${r.paymentStatus==='paid'?'Pagado':'Pendiente'}</td><td>${money(r.total)}</td></tr>`).join('')}</tbody></table></div>`}</div>`}
function clientesView(){return `<div class="section-2" style="grid-template-columns:.8fr 1.2fr;"><div class="card"><h3>Nuevo cliente</h3><div class="stack"><input id="customerBusiness" placeholder="Nombre de negocio" value="${ui.customerBusiness}"><input id="customerContact" placeholder="Nombre de contacto" value="${ui.customerContact}"><input id="customerEmail" placeholder="Correo" value="${ui.customerEmail}"><input id="customerPhone" placeholder="Teléfono" value="${ui.customerPhone}"><button id="addCustomerBtn">Agregar cliente</button></div></div><div class="card"><h3>Clientes frecuentes</h3><div class="scroll"><table><thead><tr><th>Negocio</th><th>Contacto</th><th>Correo</th><th>Teléfono</th><th>Pedidos</th><th>Total cobrado</th></tr></thead><tbody>${state.customers.map(c=>`<tr><td><strong>${c.businessName}</strong></td><td>${c.contactName}</td><td>${c.email}</td><td>${c.phone}</td><td>${c.orders}</td><td>${money(c.totalSpent)}</td></tr>`).join('')}</tbody></table></div></div></div>`}
function cobranzaView(){return `<div class="card"><h3>Control de cobranza</h3><div class="scroll"><table><thead><tr><th>Folio</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estatus</th><th>Acción</th></tr></thead><tbody>${state.savedRemisiones.map(r=>`<tr><td>${r.folio}</td><td>${r.client}</td><td>${r.date}</td><td>${money(r.total)}</td><td>${r.paymentStatus==='paid'?'<span class="badge green">Pagado</span>':'<span class="badge amber">Pendiente</span>'}</td><td>${r.paymentStatus==='paid'?`<button class="secondary small" data-pay="${r.folio}" data-status="pending">Marcar pendiente</button>`:`<button class="small" data-pay="${r.folio}" data-status="paid">Marcar pagado</button>`}</td></tr>`).join('')}</tbody></table></div></div>`}
function reportesView(){return `<div class="stack"><div class="form-3"><button class="secondary small" id="reportSalesQuick">Ver ventas</button><button class="secondary small" id="reportInventoryBtn">Ver inventario</button><button class="secondary small" id="reportCustomersBtn">Ver clientes</button></div><div class="card"><h3>Inventario de producto terminado</h3><div class="scroll"><table><thead><tr><th>Producto</th><th>Stock</th><th>Costo unitario</th><th>Valor</th></tr></thead><tbody>${state.finishedGoods.map(i=>`<tr><td><strong>${i.product}</strong></td><td><span class="pill-stock">${i.stock}</span></td><td>${money(i.theoreticalCost)}</td><td>${money(i.stock*i.theoreticalCost)}</td></tr>`).join('')}</tbody></table></div></div></div>`}
function bindLogin(){ $('#loginUser').oninput=e=>ui.loginUser=e.target.value; $('#loginPass').oninput=e=>ui.loginPass=e.target.value; $('#loginBtn').onclick=()=>{ if(ui.loginUser===appUser.username&&ui.loginPass===appUser.password){ state.authenticated=true; ui.loginError=''; render(); } else { ui.loginError='Usuario o contraseña incorrectos'; render(); } }; }
function bindMain(){ $$('[data-tab]').forEach(b=>b.onclick=()=>{state.activeTab=b.dataset.tab; render()}); $('#backupBtn').onclick=()=>saveJSON({ingredients:state.ingredients,packaging:state.packaging,finishedGoods:state.finishedGoods,customers:state.customers,movements:state.movements,savedRemisiones:state.savedRemisiones,recipes:state.recipes},'respaldo_saas_galletas.json'); $('#importBackup').onchange=(e)=>{const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{try{const p=JSON.parse(String(r.result)); state.ingredients=p.ingredients||state.ingredients; state.packaging=p.packaging||state.packaging; state.finishedGoods=p.finishedGoods||state.finishedGoods; state.customers=p.customers||state.customers; state.movements=p.movements||state.movements; state.savedRemisiones=p.savedRemisiones||state.savedRemisiones; state.recipes=p.recipes||state.recipes; persist(); notify('Respaldo importado correctamente.');}catch{alert('No fue posible leer el respaldo.')}}; r.readAsText(file); e.target.value='';}; $('#resetBtn').onclick=()=>{state=initialState(); ui={...ui,selectedRecipeId:'',batchCount:'1',productionDate:today(),entryIngredient:'HUEVO',entryQty:'100',entryTotalCost:'0',entryNote:'Compra de insumos',searchIngredient:'',recipeName:'',recipeYield:'',recipeSale:'',recipeShelf:'',recipeLabel:'ETIQUETA CLASSIC',recipeRows:[{concept:'',quantity:''}],selectedCustomerId:'1',orderClient:'Cliente mostrador',orderContact:'Cliente mostrador',orderEmail:'cliente@correo.com',orderPhone:'8180000000',orderNotes:'',orderItems:[{product:'PEANUT BUTTERCOOKIE',qty:1}],wasteProduct:'PEANUT BUTTERCOOKIE',wasteQty:'1',wasteReason:'Producto dañado',customerBusiness:'',customerContact:'',customerEmail:'',customerPhone:''}; persist(); render();}; if($('#reportRange')) $('#reportRange').onchange=e=>{state.reportRange=e.target.value; render()}; bindProduction(); bindInsumos(); bindSalidas(); bindRemisiones(); bindClientes(); bindCobranza(); bindReportes(); }
function bindProduction(){ if($('#prodRecipe')) $('#prodRecipe').onchange=e=>{ui.selectedRecipeId=e.target.value; render()}; if($('#prodLots')) $('#prodLots').oninput=e=>ui.batchCount=e.target.value; if($('#prodDate')) $('#prodDate').oninput=e=>ui.productionDate=e.target.value; if($('#saveProductionBtn')) $('#saveProductionBtn').onclick=saveProduction; if($('#recipeName')) $('#recipeName').oninput=e=>ui.recipeName=e.target.value; if($('#recipeYield')) $('#recipeYield').oninput=e=>ui.recipeYield=e.target.value; if($('#recipeSale')) $('#recipeSale').oninput=e=>ui.recipeSale=e.target.value; if($('#recipeShelf')) $('#recipeShelf').oninput=e=>ui.recipeShelf=e.target.value; if($('#recipeLabel')) $('#recipeLabel').onchange=e=>ui.recipeLabel=e.target.value; $$('[data-rconcept]').forEach(i=>i.oninput=e=>{ui.recipeRows[Number(e.target.dataset.rconcept)].concept=e.target.value; render()}); $$('[data-rqty]').forEach(i=>i.oninput=e=>{ui.recipeRows[Number(e.target.dataset.rqty)].quantity=e.target.value; render()}); $$('[data-rdel]').forEach(b=>b.onclick=()=>{if(ui.recipeRows.length>1) ui.recipeRows.splice(Number(b.dataset.rdel),1); render()}); if($('#addRecipeRowBtn')) $('#addRecipeRowBtn').onclick=()=>{ui.recipeRows.push({concept:'',quantity:''}); render()}; if($('#saveRecipeBtn')) $('#saveRecipeBtn').onclick=saveRecipeTemplate; if($('#wasteProduct')) $('#wasteProduct').onchange=e=>ui.wasteProduct=e.target.value; if($('#wasteQty')) $('#wasteQty').oninput=e=>ui.wasteQty=e.target.value; if($('#wasteReason')) $('#wasteReason').oninput=e=>ui.wasteReason=e.target.value; if($('#saveWasteBtn')) $('#saveWasteBtn').onclick=saveWaste; }
function bindInsumos(){ if($('#entryIngredient')) $('#entryIngredient').onchange=e=>ui.entryIngredient=e.target.value; if($('#entryQty')) $('#entryQty').oninput=e=>ui.entryQty=e.target.value; if($('#entryTotalCost')) $('#entryTotalCost').oninput=e=>ui.entryTotalCost=e.target.value; if($('#entryNote')) $('#entryNote').oninput=e=>ui.entryNote=e.target.value; if($('#entrySaveBtn')) $('#entrySaveBtn').onclick=saveEntry; if($('#pkgName')) $('#pkgName').oninput=e=>ui.pkgName=e.target.value; if($('#pkgStock')) $('#pkgStock').oninput=e=>ui.pkgStock=e.target.value; if($('#pkgCost')) $('#pkgCost').oninput=e=>ui.pkgCost=e.target.value; if($('#pkgMin')) $('#pkgMin').oninput=e=>ui.pkgMin=e.target.value; if($('#addPackagingBtn')) $('#addPackagingBtn').onclick=addPackaging; $$('[data-pstock]').forEach(i=>i.oninput=e=>updatePackaging(Number(e.target.dataset.pstock),'stock',e.target.value)); $$('[data-pcost]').forEach(i=>i.oninput=e=>updatePackaging(Number(e.target.dataset.pcost),'unitCost',e.target.value)); $$('[data-pdel]').forEach(b=>b.onclick=()=>deletePackaging(Number(b.dataset.pdel))); if($('#ingredientSearch')) $('#ingredientSearch').oninput=e=>{ui.searchIngredient=e.target.value; render()}; $$('[data-istock]').forEach(i=>i.oninput=e=>updateIngredient(e.target.dataset.istock,'stock',e.target.value)); $$('[data-icost]').forEach(i=>i.oninput=e=>updateIngredient(e.target.dataset.icost,'unitCost',e.target.value)); }
function bindSalidas(){ if($('#selectedCustomer')) $('#selectedCustomer').onchange=e=>selectCustomer(e.target.value); if($('#orderClient')) $('#orderClient').oninput=e=>ui.orderClient=e.target.value; if($('#orderContact')) $('#orderContact').oninput=e=>ui.orderContact=e.target.value; if($('#orderEmail')) $('#orderEmail').oninput=e=>ui.orderEmail=e.target.value; if($('#orderPhone')) $('#orderPhone').oninput=e=>ui.orderPhone=e.target.value; if($('#orderNotes')) $('#orderNotes').oninput=e=>ui.orderNotes=e.target.value; $$('[data-oprod]').forEach(i=>i.onchange=e=>{ui.orderItems[Number(e.target.dataset.oprod)].product=e.target.value; render()}); $$('[data-oqty]').forEach(i=>i.oninput=e=>{ui.orderItems[Number(e.target.dataset.oqty)].qty=Number(e.target.value)||0; render()}); $$('[data-odel]').forEach(b=>b.onclick=()=>{if(ui.orderItems.length>1) ui.orderItems.splice(Number(b.dataset.odel),1); render()}); if($('#addOrderLineBtn')) $('#addOrderLineBtn').onclick=()=>{ui.orderItems.push({product:state.recipes[0]?.outputName||'',qty:1}); render()}; if($('#generateOrderBtn')) $('#generateOrderBtn').onclick=generateOrder; if($('#printRemisionBtn')) $('#printRemisionBtn').onclick=()=>printRemision(state.selectedRemision); }
function bindRemisiones(){ $$('[data-rview]').forEach(b=>b.onclick=()=>viewRemision(b.dataset.rview)); if($('#reportSalesBtn')) $('#reportSalesBtn').onclick=reportSales; }
function bindClientes(){ if($('#customerBusiness')) $('#customerBusiness').oninput=e=>ui.customerBusiness=e.target.value; if($('#customerContact')) $('#customerContact').oninput=e=>ui.customerContact=e.target.value; if($('#customerEmail')) $('#customerEmail').oninput=e=>ui.customerEmail=e.target.value; if($('#customerPhone')) $('#customerPhone').oninput=e=>ui.customerPhone=e.target.value; if($('#addCustomerBtn')) $('#addCustomerBtn').onclick=addCustomer; }
function bindCobranza(){ $$('[data-pay]').forEach(b=>b.onclick=()=>togglePayment(b.dataset.pay,b.dataset.status)); }
function bindReportes(){ if($('#reportSalesQuick')) $('#reportSalesQuick').onclick=reportSales; if($('#reportInventoryBtn')) $('#reportInventoryBtn').onclick=reportInventory; if($('#reportCustomersBtn')) $('#reportCustomersBtn').onclick=reportCustomers; }
function selectCustomer(id){ ui.selectedCustomerId=String(id); const c=state.customers.find(x=>String(x.id)===String(id)); if(c){ ui.orderClient=c.businessName; ui.orderContact=c.contactName; ui.orderEmail=c.email; ui.orderPhone=c.phone; } render(); }
function updateIngredient(name,field,val){ const num=Number(val); state.ingredients=state.ingredients.map(i=>i.name===name?{...i,[field]:Number.isFinite(num)?num:i[field]}:i); persist(); render(); }
function updatePackaging(id,field,val){ const num=Number(val); state.packaging=state.packaging.map(i=>i.id===id?{...i,[field]:Number.isFinite(num)?num:i[field]}:i); persist(); render(); }
function deletePackaging(id){ state.packaging=state.packaging.filter(i=>i.id!==id); state.notice='Registro de etiqueta o bolsa eliminado.'; persist(); render(); }
function addPackaging(){ if(!String(ui.pkgName).trim()) return; state.packaging.push({id:Date.now(),name:String(ui.pkgName).trim().toUpperCase(),unitBase:'pza',stock:Number(ui.pkgStock)||0,unitCost:Number(ui.pkgCost)||0,reorderPoint:Number(ui.pkgMin)||0}); ui.pkgName=''; ui.pkgStock=''; ui.pkgCost=''; ui.pkgMin=''; persist(); notify('Etiqueta o bolsa agregada correctamente.'); }
function saveEntry(){ const qty=Number(ui.entryQty)||0,totalCost=Number(ui.entryTotalCost)||0; if(qty<=0) return; state.ingredients=state.ingredients.map(item=>{ if(item.name!==ui.entryIngredient) return item; const currentStock=Number(item.stock)||0; const currentValue=currentStock*(Number(item.unitCost)||0); const newStock=currentStock+qty; const newValue=currentValue+totalCost; return {...item,stock:Number(newStock.toFixed(2)),unitCost:Number((newValue/newStock).toFixed(4))};}); state.movements.unshift({id:state.movements.length+1,date:stamp(),type:'Entrada insumo',product:ui.entryIngredient,detail:`${ui.entryNote||'Entrada manual de almacén'} · costo total ${money(totalCost)}`,qty}); ui.entryQty='100'; ui.entryTotalCost='0'; persist(); notify('Entrada de insumo registrada.'); }
function saveRecipeTemplate(){ const name=String(ui.recipeName).trim(); if(!name) return; const rows=ui.recipeRows.filter(r=>String(r.concept).trim()&&Number(r.quantity)>0).map(r=>[String(r.concept).trim().toUpperCase(),Number(r.quantity)]); const recipe={id:name.toUpperCase(),outputName:name.toUpperCase(),yieldPerBatch:Number(ui.recipeYield)||1,salePrice:Number(ui.recipeSale)||0,shelfLifeDays:Number(ui.recipeShelf)||5,labelType:ui.recipeLabel,ingredients:rows}; state.recipes.push(recipe); state.finishedGoods.push({product:recipe.outputName,stock:0,salePrice:recipe.salePrice,theoreticalCost:Number((recipeCost(recipe,state.ingredients)/recipe.yieldPerBatch).toFixed(2)),yieldPerBatch:recipe.yieldPerBatch,shelfLifeDays:recipe.shelfLifeDays,labelType:recipe.labelType,lastProductionDate:null,nextExpiryDate:null}); ui.recipeName=''; ui.recipeYield=''; ui.recipeSale=''; ui.recipeShelf=''; ui.recipeRows=[{concept:'',quantity:''}]; persist(); notify('Plantilla de receta creada.'); }
function saveProduction(){ const recipe=state.recipes.find(r=>r.id===ui.selectedRecipeId); if(!recipe) return; const lots=Math.max(1,Number(ui.batchCount)||1); const reqIng=recipe.ingredients.map(([n,q])=>({name:n,need:q*lots,stock:state.ingredients.find(i=>i.name===n)?.stock||0})); const reqBag={name:'BOLSA STANDARD',need:recipe.yieldPerBatch*lots,stock:state.packaging.find(p=>p.name==='BOLSA STANDARD')?.stock||0}; const reqLabel={name:recipe.labelType,need:recipe.yieldPerBatch*2*lots,stock:state.packaging.find(p=>p.name===recipe.labelType)?.stock||0}; const insufficient=[...reqIng,reqBag,reqLabel].filter(x=>x.stock<x.need); if(insufficient.length) return alert(`No hay inventario suficiente para: ${insufficient.map(i=>i.name).join(', ')}`); state.ingredients=state.ingredients.map(item=>{const r=reqIng.find(x=>x.name===item.name); return r?{...item,stock:Number((item.stock-r.need).toFixed(2))}:item}); state.packaging=state.packaging.map(item=>item.name==='BOLSA STANDARD'?{...item,stock:Number((item.stock-reqBag.need).toFixed(2))}:item.name===recipe.labelType?{...item,stock:Number((item.stock-reqLabel.need).toFixed(2))}:item); const produced=recipe.yieldPerBatch*lots, expiry=addDays(ui.productionDate, recipe.shelfLifeDays); state.finishedGoods=state.finishedGoods.map(item=>item.product===recipe.outputName?{...item,stock:item.stock+produced,theoreticalCost:Number((recipeCost(recipe,state.ingredients)/recipe.yieldPerBatch).toFixed(2)),lastProductionDate:ui.productionDate,nextExpiryDate:expiry,labelType:recipe.labelType}:item); state.movements.unshift({id:state.movements.length+1,date:stamp(),type:'Producción',product:recipe.outputName,detail:`${lots} lote(s) · ${produced} pzas · elaboración ${ui.productionDate} · vence ${expiry} · ${recipe.labelType}`,qty:produced}); ui.selectedRecipeId=''; ui.batchCount='1'; persist(); notify('Producción registrada. Ya se reflejó en reportes.'); }
function saveWaste(){ const qty=Number(ui.wasteQty)||0; const fg=state.finishedGoods.find(f=>f.product===ui.wasteProduct); if(!fg||qty<=0||fg.stock<qty) return alert('No hay suficiente producto terminado para registrar la merma.'); state.finishedGoods=state.finishedGoods.map(f=>f.product===ui.wasteProduct?{...f,stock:f.stock-qty}:f); state.movements.unshift({id:state.movements.length+1,date:stamp(),type:'Merma',product:ui.wasteProduct,detail:ui.wasteReason||'Merma de producto terminado',qty:-qty}); persist(); render(); }
function generateOrder(){ const invalid=ui.orderItems.filter(item=>{const stock=state.finishedGoods.find(f=>f.product===item.product)?.stock||0; return !item.product||Number(item.qty||0)<=0||stock<Number(item.qty||0)}); if(invalid.length) return alert('Revisa las cantidades. Hay productos sin stock suficiente o líneas inválidas.'); const rem={folio:`REM-${Date.now().toString().slice(-6)}`,date:stamp(),client:ui.orderClient,contact:ui.orderContact,email:ui.orderEmail,phone:ui.orderPhone,customerId:Number(ui.selectedCustomerId),notes:ui.orderNotes,paymentStatus:'pending',items:ui.orderItems.map(item=>{const fg=state.finishedGoods.find(f=>f.product===item.product); const qty=Number(item.qty||0); return {product:item.product,qty,price:fg?.salePrice||0,subtotal:(fg?.salePrice||0)*qty,expiry:fg?.nextExpiryDate,elaboration:fg?.lastProductionDate,cost:fg?.theoreticalCost||0,labelType:fg?.labelType||'N/D'}}),total:ui.orderItems.reduce((a,item)=>a+((state.finishedGoods.find(f=>f.product===item.product)?.salePrice||0)*Number(item.qty||0)),0)}; state.finishedGoods=state.finishedGoods.map(f=>{const line=ui.orderItems.find(i=>i.product===f.product); return line?{...f,stock:f.stock-Number(line.qty)}:f}); state.savedRemisiones.unshift(rem); state.selectedRemision=rem; state.customers=state.customers.map(c=>c.id===Number(ui.selectedCustomerId)?{...c,orders:c.orders+1,businessName:ui.orderClient,contactName:ui.orderContact,email:ui.orderEmail,phone:ui.orderPhone}:c); ui.selectedCustomerId='1'; ui.orderClient=''; ui.orderContact=''; ui.orderEmail=''; ui.orderPhone=''; ui.orderNotes=''; ui.orderItems=[{product:state.recipes[0]?.outputName||'',qty:1}]; persist(); notify('Salida registrada y remisión generada.'); }
function viewRemision(folio){const rem=state.savedRemisiones.find(r=>r.folio===folio); if(!rem) return; state.selectedRemision=rem; state.activeTab='salidas'; persist(); notify(`Remisión ${rem.folio} abierta.`);}
function addCustomer(){ if(!String(ui.customerBusiness).trim()) return; state.customers.push({id:Date.now(),businessName:ui.customerBusiness,contactName:ui.customerContact,email:ui.customerEmail,phone:ui.customerPhone,orders:0,totalSpent:0}); ui.customerBusiness=''; ui.customerContact=''; ui.customerEmail=''; ui.customerPhone=''; persist(); notify('Cliente agregado correctamente.'); }
function togglePayment(folio,status){const target=state.savedRemisiones.find(r=>r.folio===folio); if(!target) return; state.savedRemisiones=state.savedRemisiones.map(r=>r.folio===folio?{...r,paymentStatus:status}:r); if(status==='paid'&&target.paymentStatus!=='paid'){state.customers=state.customers.map(c=>c.id===target.customerId?{...c,totalSpent:c.totalSpent+target.total}:c)} if(status==='pending'&&target.paymentStatus==='paid'){state.customers=state.customers.map(c=>c.id===target.customerId?{...c,totalSpent:Math.max(0,c.totalSpent-target.total)}:c)} persist(); notify(`Cobranza actualizada a ${status==='paid'?'pagado':'pendiente'}.`)}
function reportSales(){const d=calc(); const rows=[['Folio','Fecha','Cliente','Estatus','Productos','Piezas','Total']].concat(d.filtered.map(r=>[r.folio,r.date,r.client,r.paymentStatus,r.items.map(i=>i.product).join(' | '),r.items.reduce((s,i)=>s+Number(i.qty),0),r.total])); csvWindow(rows,'reporte_ventas.csv')}
function reportInventory(){const rows=[['Producto','Stock','Costo unitario','Valor']].concat(state.finishedGoods.map(i=>[i.product,i.stock,i.theoreticalCost,Number((i.stock*i.theoreticalCost).toFixed(2))])); csvWindow(rows,'reporte_inventario.csv')}
function reportCustomers(){const rows=[['Negocio','Contacto','Correo','Teléfono','Pedidos','Total cobrado']].concat(state.customers.map(c=>[c.businessName,c.contactName,c.email,c.phone,c.orders,c.totalSpent])); csvWindow(rows,'clientes.csv')}
render();
})();
</script>
</body>
