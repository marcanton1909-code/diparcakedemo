      bagName: ['CHURROCOOKIE', 'CARROTCOOKIE'].includes(String(recipeName).toUpperCase()) ? 'BOLSA 12X20' : 'BOLSA 10X15',
      labels: ['ETIQUETA REDONDA', 'ETIQUETA SABOR'],
    });

    const computeRecipeCost = (recipe, ingredients, packaging) => {
      const insumoCost = recipe.ingredients.reduce((acc, [name, qty]) => {
        const baseUnitCost = ingredients.find((i) => i.name === name)?.unitCost || 0;
        const overrideAmount = recipe.ingredientAmountOverrides?.[name];
        return acc + (typeof overrideAmount === 'number' ? overrideAmount : baseUnitCost * qty);
      }, 0);
      const pkg = getPackagingForRecipe(recipe.outputName);
      const bagCost = packaging.find((p) => p.name === pkg.bagName)?.unitCost || 0;
      const labelsCost = pkg.labels.reduce((sum, label) => sum + (packaging.find((p) => p.name === label)?.unitCost || 0), 0);
      return insumoCost + ((bagCost + labelsCost) * recipe.yieldPerBatch);
    };

      const finishedGoods = recipeData.map((recipe) => {
        const pkg = getPackagingForRecipe(recipe.outputName);

        return {
          product: recipe.outputName,
          stock: 0,
          salePrice: recipe.salePrice,
          theoreticalCost: Number((totalCost / recipe.yieldPerBatch).toFixed(2)),
          yieldPerBatch: recipe.yieldPerBatch,
          shelfLifeDays: recipe.shelfLifeDays,
          lastProductionDate: null,
          nextExpiryDate: null,

      const url = URL.createObjectURL(blob);
      const win = window.open('', '_blank');
      if (!win) return;
      win.document.write(`<html><head><title>${filename}</title></head><body style="font-family:Arial;padding:20px"><h2>${filename}</h2><a href="${url}" download="${filename}">Descargar</a><pre style="white-space:pre-wrap;margin-top:20px">${csv}</pre></body></html>`);

                      </div>
                    ))}
                    <Button variant="outline" onClick={addOrderLine} className="w-full rounded-2xl">Agregar producto</Button>
                    <Textarea value={orderNotes} onChange={(e) => setOrderNotes(e.target.value)} className="min-h-[90px] rounded-2xl" placeholder="Notas" />
                    <div className="rounded-2xl bg-slate-50 p-4"><p className="text-sm text-slate-500">Total estimado</p><p className="mt-2 text-2xl font-semibold">{money(orderItems.reduce((acc, item) => acc + ((safeFinishedGoods.find((fg) => fg.product === item.product)?.salePrice || 0) * item.qty), 0))}</p></div>
                    <Button onClick={generateOrder} className="w-full rounded-2xl py-6 text-base">Generar salida y remisión</Button>
                  </CardContent>
                </Card>

                <Card className="rounded-3xl border-slate-200">
                  <CardHeader className="flex flex-row items-center justify-between"><CardTitle className="text-lg">Remisión / nota</CardTitle><Button variant="outline" className="rounded-2xl" onClick={() => selectedRemision && openPrintPreview(renderRemisionHtml(selectedRemision), selectedRemision.folio)} disabled={!selectedRemision}>Imprimir / Guardar</Button></CardHeader>
                  <CardContent>
                    {!selectedRemision ? <div className="rounded-2xl border border-dashed p-10 text-center text-sm text-slate-500">Aquí aparecerá la remisión seleccionada.</div> : <div className="rounded-3xl border p-6"><h3 className="text-2xl font-semibold text-slate-900">Remisión {selectedRemision.folio}</h3><div className="table-wrap mt-6"><table><thead><tr><th>Producto</th><th>Pzas</th><th>Etiqueta receta</th><th>Precio</th><th className="text-right">Subtotal</th></tr></thead><tbody>{selectedRemision.items.map((item, idx) => <tr key={`${item.product}-${idx}`}><td>{item.product}</td><td>{item.qty}</td><td>{item.labelType}</td><td>{money(item.price)}</td><td className="text-right">{money(item.subtotal)}</td></tr>)}</tbody></table></div></div>}
                  </CardContent>
                </Card>
              </div>
            )}

            {activeTab === 'remisiones' && (
              <Card className="rounded-3xl border-slate-200">
                <CardHeader className="flex flex-row items-center justify-between gap-3"><CardTitle className="text-lg">Historial de remisiones</CardTitle><Button variant="outline" className="rounded-2xl" onClick={() => openCSVPreview([['Folio', 'Fecha', 'Cliente', 'Estatus', 'Productos', 'Piezas', 'Total'], ...store.savedRemisiones.map((r) => [r.folio, r.date, r.client, r.paymentStatus, r.items.map((i) => i.product).join(' | '), r.items.reduce((s, i) => s + i.qty, 0), r.total])], 'reporte_ventas.csv')}>Exportar ventas</Button></CardHeader>
                <CardContent>
                  {store.savedRemisiones.length === 0 ? <div className="rounded-2xl border border-dashed p-10 text-center text-sm text-slate-500">Aún no hay remisiones guardadas.</div> : (
                    <div className="table-wrap">
                      <table>
                        <thead><tr><th>Ver</th><th>Folio</th><th>Fecha</th><th>Cliente</th><th>Estatus</th><th>Total</th></tr></thead>
                        <tbody>{store.savedRemisiones.map((r) => <tr key={r.folio}><td><Button size="sm" variant="outline" className="rounded-xl" onClick={() => { setSelectedRemisionFolio(r.folio); setNotice(`Remisión ${r.folio} abierta.`); }}>Ver</Button></td><td className="font-medium">{r.folio}</td><td>{r.date}</td><td>{r.client}</td><td>{r.paymentStatus === 'paid' ? 'Pagado' : 'Pendiente'}</td><td>{money(r.total)}</td></tr>)}</tbody>
                      </table>
                    </div>
                  )}
                </CardContent>
              </Card>
            )}

            {activeTab === 'clientes' && (
              <div className="grid gap-4 lg:grid-cols-[0.8fr_1.2fr]">
                <Card className="rounded-3xl border-slate-200">
                  <CardHeader><CardTitle className="text-lg">Nuevo cliente</CardTitle></CardHeader>
                  <CardContent className="space-y-4">
                    <Input placeholder="Nombre de negocio" value={newCustomerForm.businessName} onChange={(e) => setNewCustomerForm((c) => ({ ...c, businessName: e.target.value }))} className="rounded-2xl" />
                    <Input placeholder="Nombre de contacto" value={newCustomerForm.contactName} onChange={(e) => setNewCustomerForm((c) => ({ ...c, contactName: e.target.value }))} className="rounded-2xl" />
                    <Input placeholder="Correo" value={newCustomerForm.email} onChange={(e) => setNewCustomerForm((c) => ({ ...c, email: e.target.value }))} className="rounded-2xl" />
                    <Input placeholder="Teléfono" value={newCustomerForm.phone} onChange={(e) => setNewCustomerForm((c) => ({ ...c, phone: e.target.value }))} className="rounded-2xl" />
                    <Button onClick={addCustomer} className="w-full rounded-2xl py-6 text-base">Agregar cliente</Button>
                  </CardContent>
                </Card>

                <Card className="rounded-3xl border-slate-200">
                  <CardHeader><CardTitle className="text-lg">Clientes frecuentes</CardTitle></CardHeader>
                  <CardContent>
                    <div className="table-wrap">
                      <table>
                        <thead><tr><th>Negocio</th><th>Contacto</th><th>Correo</th><th>Teléfono</th><th>Pedidos</th><th className="text-right">Total cobrado</th></tr></thead>
                        <tbody>{safeCustomers.map((customer) => <tr key={customer.id}><td className="font-medium">{customer.businessName}</td><td>{customer.contactName}</td><td>{customer.email}</td><td>{customer.phone}</td><td>{customer.orders}</td><td className="text-right">{money(customer.totalSpent)}</td></tr>)}</tbody>
                      </table>
                    </div>
                  </CardContent>
                </Card>
              </div>
            )}

            {activeTab === 'cobranza' && (
              <Card className="rounded-3xl border-slate-200">
                <CardHeader><CardTitle className="text-lg">Control de cobranza</CardTitle></CardHeader>
                <CardContent>
                  <div className="table-wrap">
                    <table>
                      <thead><tr><th>Folio</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estatus</th><th className="text-right">Acción</th></tr></thead>
                      <tbody>{store.savedRemisiones.map((r) => <tr key={r.folio}><td>{r.folio}</td><td>{r.client}</td><td>{r.date}</td><td>{money(r.total)}</td><td>{r.paymentStatus === 'paid' ? <span className="badge badge-green">Pagado</span> : <span className="badge badge-yellow">Pendiente</span>}</td><td className="text-right">{r.paymentStatus === 'paid' ? <Button size="sm" variant="outline" className="rounded-xl" onClick={() => markRemisionStatus(r.folio, 'pending')}>Marcar pendiente</Button> : <Button size="sm" className="rounded-xl" onClick={() => markRemisionStatus(r.folio, 'paid')}>Marcar pagado</Button>}</td></tr>)}</tbody>
                    </table>
                  </div>
                </CardContent>
              </Card>
            )}

            {activeTab === 'reportes' && (
              <div className="space-y-4">
                <div className="grid gap-3 md:grid-cols-3">
                  <Button onClick={exportSales} variant="outline" size="sm" className="rounded-2xl h-9 text-xs">Ver ventas</Button>
                  <Button onClick={exportInventory} variant="outline" size="sm" className="rounded-2xl h-9 text-xs">Ver inventario</Button>
                  <Button onClick={exportCustomers} variant="outline" size="sm" className="rounded-2xl h-9 text-xs">Ver clientes</Button>
                </div>
                <Card className="rounded-3xl border-slate-200">
                  <CardHeader><CardTitle className="text-lg">Inventario de producto terminado</CardTitle></CardHeader>
                  <CardContent>
                    <div className="table-wrap">
                      <table>
                        <thead><tr><th>Producto</th><th>Stock</th><th>Costo unitario</th><th className="text-right">Valor</th></tr></thead>
                        <tbody>{safeFinishedGoods.map((item) => <tr key={item.product}><td className="font-medium">{item.product}</td><td><span className="pill-stock">{item.stock}</span></td><td>{money(item.theoreticalCost)}</td><td className="text-right">{money(item.stock * item.theoreticalCost)}</td></tr>)}</tbody>
                      </table>
                    </div>
                  </CardContent>
                </Card>
              </div>
            )}

            {activeTab === 'recetas' && (
              <div className="space-y-4">
                <div className="grid gap-4 lg:grid-cols-[0.85fr_1.15fr]">
                  <Card className="rounded-3xl border-slate-200">
                    <CardHeader><CardTitle className="text-lg">Editar costos por receta</CardTitle></CardHeader>
                    <CardContent className="space-y-4">
                      <select className="select" value={selectedEditableRecipeId} onChange={(e) => setSelectedEditableRecipeId(e.target.value)}>
                        {safeRecipes.map((recipe) => <option key={recipe.id} value={recipe.id}>{recipe.outputName}</option>)}
                      </select>
                      <div className="rounded-2xl bg-slate-50 p-4"><p className="text-sm text-slate-500">Costo teórico actual por lote</p><p className="mt-2 text-2xl font-semibold">{money(computeRecipeCost(selectedEditableRecipe, store.ingredients, store.packaging))}</p><p className="mt-1 text-xs text-slate-500">El costo base del insumo se actualiza desde Insumos. Aquí solo puedes ajustar el importe del renglón en casos excepcionales.</p></div>
                    </CardContent>
                  </Card>

                  <Card className="rounded-3xl border-slate-200">
                    <CardHeader><CardTitle className="text-lg">Insumos de la receta</CardTitle></CardHeader>
                    <CardContent>
                      <div className="table-wrap">
                        <table>
                          <thead><tr><th>Insumo</th><th>Cantidad</th><th>Costo base</th><th>Importe editable</th><th className="text-right">Importe</th></tr></thead>
                          <tbody>{selectedEditableRecipe.ingredients.map(([name, qty]) => {
                            const baseCost = store.ingredients.find((i) => i.name === name)?.unitCost || 0;
                            const appliedAmount = typeof selectedEditableRecipe.ingredientAmountOverrides?.[name] === 'number' ? selectedEditableRecipe.ingredientAmountOverrides[name] : (baseCost * qty);
                            return <tr key={`${selectedEditableRecipe.id}-${name}`}><td className="font-medium">{name}</td><td>{qty}</td><td>{money(baseCost)}</td><td><Input type="number" step="0.0001" value={appliedAmount} onChange={(e) => updateRecipeOverrideAmount(selectedEditableRecipe.id, name, e.target.value)} className="h-9 w-28 rounded-xl" /></td><td className="text-right">{money(appliedAmount)}</td></tr>;
                          })}</tbody>
                        </table>
                      </div>
                    </CardContent>
                  </Card>
                </div>

                <Card className="rounded-3xl border-slate-200">
                  <CardHeader><CardTitle className="text-lg">Nueva plantilla de receta</CardTitle></CardHeader>
                  <CardContent className="space-y-4">
                    <div className="grid gap-4 md:grid-cols-2">
                      <Input placeholder="Nombre del producto" value={newRecipeMeta.name} onChange={(e) => setNewRecipeMeta((c) => ({ ...c, name: e.target.value }))} className="rounded-2xl" />
                      <Input placeholder="Rendimiento por lote" type="number" value={newRecipeMeta.yieldPerBatch} onChange={(e) => setNewRecipeMeta((c) => ({ ...c, yieldPerBatch: e.target.value }))} className="rounded-2xl" />
                      <Input placeholder="Precio venta" type="number" value={newRecipeMeta.salePrice} onChange={(e) => setNewRecipeMeta((c) => ({ ...c, salePrice: e.target.value }))} className="rounded-2xl" />
                      <Input placeholder="Vida útil días" type="number" value={newRecipeMeta.shelfLifeDays} onChange={(e) => setNewRecipeMeta((c) => ({ ...c, shelfLifeDays: e.target.value }))} className="rounded-2xl" />
                    </div>
                    <div className="rounded-2xl bg-slate-50 p-4"><p className="text-sm text-slate-500">Empaque automático de producción</p><p className="mt-1 text-sm text-slate-700">Todas las recetas llevan Etiqueta redonda + Etiqueta sabor. Solo Churrocookie y Carrotcookie usan Bolsa 12x20. El resto usa Bolsa 10x15.</p></div>
                    <div className="table-wrap">
                      <table>
                        <thead><tr><th>Concepto</th><th>Cantidad</th><th>Stock actual</th><th>Costo</th><th></th></tr></thead>
                        <tbody>{newRecipeRows.map((row, index) => {
                          const ingredient = store.ingredients.find((i) => i.name === row.concept.trim().toUpperCase());
                          const qty = Number(row.quantity || 0);
                          return <tr key={index}><td><Input value={row.concept} onChange={(e) => updateRecipeRow(index, 'concept', e.target.value)} placeholder="Insumo" className="rounded-xl" /></td><td><Input value={row.quantity} onChange={(e) => updateRecipeRow(index, 'quantity', e.target.value)} type="number" placeholder="Cantidad" className="rounded-xl" /></td><td>{ingredient ? (ingredient.nonStock ? 'Fijo' : ingredient.stock) : '—'}</td><td>{ingredient ? money((ingredient.unitCost || 0) * qty) : '—'}</td><td className="text-right"><Button variant="outline" size="sm" className="rounded-xl" onClick={() => removeRecipeRow(index)}>Eliminar</Button></td></tr>;
                        })}</tbody>
                      </table>
                    </div>
                    <Button variant="outline" onClick={addRecipeRow} className="w-full rounded-2xl">Agregar renglón</Button>
                    <Button onClick={createRecipeTemplate} className="w-full rounded-2xl py-6 text-base">Crear plantilla de receta</Button>
                  </CardContent>
                </Card>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SaaSGalletasPrototype />);
  </script>
</body>
</html>
