<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Galletería Demo</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #0f172a;
      --primary-2: #334155;
      --green: #15803d;
      --green-bg: #dcfce7;
      --amber: #b45309;
      --amber-bg: #fef3c7;
      --red: #b91c1c;
      --red-bg: #fee2e2;
      --blue-bg: #dbeafe;
      --blue: #1d4ed8;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { max-width: 1440px; margin: 0 auto; padding: 24px; }
    .hero {
      background: linear-gradient(135deg, #0f172a, #334155);
      color: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 20px;
      align-items: center;
    }
    .hero h1 { margin: 12px 0 0; font-size: 34px; }
    .hero p { color: #cbd5e1; line-height: 1.6; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .hero-box { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 22px; padding: 18px; }
    .grid { display: grid; gap: 16px; }
    .kpis { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-top: 18px; }
    .kpi, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .kpi { padding: 20px; }
    .kpi .label { color: var(--muted); font-size: 14px; }
    .kpi .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .kpi .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0; }
    .tab-btn {
      background: white; border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; cursor: pointer;
      font-weight: 600; color: var(--primary);
    }
    .tab-btn.active { background: var(--primary); color: white; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .card { padding: 18px; }
    .card h3 { margin: 0 0 14px; font-size: 20px; }
    .section-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .section-grid-3 { display: grid; grid-template-columns: .9fr 1.1fr; gap: 16px; }
    .stack { display: grid; gap: 16px; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 600;
      background: #e2e8f0; color: #334155;
    }
    .badge.green { background: var(--green-bg); color: var(--green); }
    .badge.amber { background: var(--amber-bg); color: var(--amber); }
    .badge.red { background: var(--red-bg); color: var(--red); }
    .notice {
      margin-top: 14px; display: inline-flex; align-items: center; gap: 8px; background: rgba(16,185,129,.15); color: #d1fae5;
      padding: 10px 14px; border-radius: 14px; font-size: 14px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 14px; font: inherit; background: white;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      border: 0; background: var(--primary); color: white; padding: 12px 16px; border-radius: 14px; cursor: pointer; font: inherit; font-weight: 600;
    }
    button.secondary { background: white; color: var(--primary); border: 1px solid var(--border); }
    button.small { padding: 8px 12px; font-size: 12px; border-radius: 12px; }
    button.danger { background: #dc2626; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 12px; border-top: 1px solid var(--border); text-align: left; vertical-align: middle; }
    th { color: var(--muted); font-weight: 600; font-size: 13px; }
    tr:first-child td, tr:first-child th { border-top: 0; }
    .scroll { max-height: 640px; overflow: auto; }
    .pill-stock { display: inline-flex; border-radius: 999px; background: var(--green-bg); color: var(--green); padding: 6px 10px; font-weight: 700; min-width: 58px; justify-content: center; }
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-grid { width: 100%; max-width: 1180px; display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px; }
    .login-hero { background: linear-gradient(135deg, #020617, #334155); color: white; border-radius: 32px; padding: 34px; box-shadow: var(--shadow); }
    .login-card { background: white; border: 1px solid var(--border); border-radius: 32px; padding: 34px; box-shadow: var(--shadow); }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .form-grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .panel-lite { background: #f8fafc; border-radius: 18px; padding: 14px; }
    .empty { border: 1px dashed var(--border); border-radius: 18px; padding: 26px; color: var(--muted); text-align: center; }
    .row-action { display: flex; justify-content: flex-end; }
    @media (max-width: 1100px) {
      .hero, .login-grid, .section-grid-2, .section-grid-3, .kpis { grid-template-columns: 1fr; }
      .form-grid-2, .form-grid-3, .form-grid-4 { grid-template-columns: 1fr; }
      .hero-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>

  const recipeData = [

    { id: 'CARROTCOOKIE', outputName: 'CARROTCOOKIE', yieldPerBatch: 12, salePrice: 35, shelfLifeDays: 4, labelType: 'ETIQUETA PREMIUM', ingredients: [['VAINILLA', 10], ['MANTEQUILLA', 220], ['HUEVO', 2], ['AZUCAR REFINADA', 120], ['AZCUAR MORENA', 260], ['ZANAHORIA', 100], ['HARINA SELECTA', 420], ['CANELA', 10], ['REXAL', 10], ['BICARBONATO', 10], ['AGUA', 1], ['ELABORACION', 1], ['PAPEL/DESENGRASANTE', 1], ['BETUN DE QUESO CREMA', 70]] },
    { id: 'BISCOFFCOOKIE', outputName: 'BISCOFFCOOKIE', yieldPerBatch: 35, salePrice: 35, shelfLifeDays: 5, labelType: 'ETIQUETA CLASSIC', ingredients: [['MANTEQUILLA', 240], ['AZUCAR REFINADA', 100], ['AZCUAR MORENA', 200], ['HUEVO', 2], ['VAINILLA', 10], ['BISCOFF', 160], ['HARINA SELECTA', 400], ['BICARBONATO', 5], ['SAL', 5], ['CHISPAS BLANCAS', 200], ['GALLETA BISCOFF', 200], ['ELABORACION', 1], ['PAPEL/DESENGRASANTE', 1], ['AGUA', 1]] },
    { id: 'REDVELVET COOKIE', outputName: 'REDVELVET COOKIE', yieldPerBatch: 24, salePrice: 35, shelfLifeDays: 5, labelType: 'ETIQUETA PREMIUM', ingredients: [['HARINA SELECTA', 440], ['COCOA', 32], ['BICARBONATO', 10], ['SAL', 10], ['MANTEQUILLA', 220], ['AZUCAR REFINADA', 200], ['AZCUAR MORENA', 120], ['HUEVO', 2], ['VAINILLA', 10], ['CHISPAS BLANCAS', 250], ['AGUA', 1], ['ELABORACION', 1], ['PAPEL/DESENGRASANTE', 1]] },
    { id: 'CHURROCOOKIE', outputName: 'CHURROCOOKIE', yieldPerBatch: 30, salePrice: 35, shelfLifeDays: 4, labelType: 'ETIQUETA CLASSIC', ingredients: [['MANTEQUILLA', 226], ['AZCUAR MORENA', 200], ['AZUCAR REFINADA', 70], ['HUEVO', 2], ['VAINILLA', 10], ['HARINA SELECTA', 380], ['FECULA DE MAIZ', 15], ['BICARBONATO', 5], ['SAL', 5], ['CANELA', 10], ['ELABORACION', 1], ['AGUA', 1], ['PAPEL/DESENGRASANTE', 1], ['BETUN DE QUESO CREMA', 70]] },
    { id: 'BROWNIECOOKIE', outputName: 'BROWNIECOOKIE', yieldPerBatch: 32, salePrice: 35, shelfLifeDays: 5, labelType: 'ETIQUETA CLASSIC', ingredients: [['AZUCAR REFINADA', 80], ['HUEVO', 4], ['MANTEQUILLA', 226], ['HARINA SELECTA', 600], ['AZCUAR MORENA', 320], ['COCOA', 100], ['REXAL', 20], ['BICARBONATO', 10], ['SAL', 10], ['CHISPAS DE CHOCOLATE', 160], ['PAPEL/DESENGRASANTE', 1], ['AGUA', 1], ['ELABORACION', 1]] },
    { id: 'MINICHOCOCHIP', outputName: 'MINICHOCOCHIP', yieldPerBatch: 36, salePrice: 35, shelfLifeDays: 5, labelType: 'ETIQUETA PREMIUM', ingredients: [['HARINA SELECTA', 750], ['REXAL', 10], ['MANTEQUILLA', 420], ['AZCUAR MORENA', 300], ['AZUCAR REFINADA', 90], ['VAINILLA', 20], ['HUEVO', 4], ['CHISPAS DE CHOCOLATE', 380], ['PAPEL/DESENGRASANTE', 1], ['AGUA', 1], ['ELABORACION', 1]] },
    { id: 'BESOS DE NUEZ', outputName: 'BESOS DE NUEZ', yieldPerBatch: 24, salePrice: 30, shelfLifeDays: 6, labelType: 'ETIQUETA CLASSIC', ingredients: [['HARINA SELECTA', 620], ['AZUCAR GLASS', 120], ['MANTEQUILLA', 400], ['NUEZ PECANA', 200], ['VAINILLA', 20], ['PAPEL/DESENGRASANTE', 1], ['AGUA', 1], ['ELABORACION', 1]] },
  ];

  const qs = (s, el=document) => el.querySelector(s);
  const qsa = (s, el=document) => [...el.querySelectorAll(s)];
  const currency = (v) => new Intl.NumberFormat('es-MX', { style:'currency', currency:'MXN' }).format(v || 0);
  const today = () => new Date().toISOString().slice(0,10);
  const formatDate = (v) => new Intl.DateTimeFormat('es-MX', { dateStyle:'medium' }).format(new Date(`${v}T00:00:00`));
  const addDays = (d, days) => { const x = new Date(`${d}T00:00:00`); x.setDate(x.getDate()+days); return x.toISOString().slice(0,10); };
  const daysDiff = (endDate) => Math.ceil((new Date(`${endDate}T23:59:59`) - new Date()) / (1000*60*60*24));
  const timestampNow = () => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
  const statusBadge = (date) => {
    if (!date) return '<span class="badge">Sin producción</span>';
    const remaining = daysDiff(date);
    if (remaining < 0) return '<span class="badge red">Caducado</span>';
    if (remaining <= 1) return '<span class="badge amber">Por vencer</span>';
    return '<span class="badge green">Vigente</span>';
  };
  const csvWindow = (rows, filename) => {
    const csv = rows.map(r => r.map(cell => `"${String(cell ?? '').replaceAll('"','""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const win = window.open('', '_blank');
    if (!win) return alert('Tu navegador bloqueó la ventana emergente.');
    win.document.write(`<html><head><title>${filename}</title></head><body style="font-family:Arial;padding:20px;"><h2>${filename}</h2><a href="${url}" download="${filename}" style="display:inline-block;padding:10px 14px;background:#111827;color:#fff;text-decoration:none;border-radius:10px;">Descargar</a><pre style="white-space:pre-wrap;margin-top:20px;border:1px solid #ddd;padding:12px;overflow:auto;">${csv}</pre></body></html>`);
    win.document.close();
  };
  const printWindow = (html, title) => {
    const win = window.open('', '_blank');
    if (!win) return alert('Tu navegador bloqueó la ventana emergente para imprimir.');
    win.document.write(`<html><head><title>${title}</title></head><body style="font-family:Arial;padding:24px;">${html}</body></html>`);
    win.document.close();
    setTimeout(() => { try { win.focus(); win.print(); } catch(e){} }, 500);
  };
  const saveJSON = (data, filename) => {
    const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  };
  const computeRecipeCost = (recipe, ingredients) => recipe.ingredients.reduce((acc,[name,qty]) => acc + ((ingredients.find(i => i.name === name)?.unitCost || 0) * qty), 0);

  function initialState() {
    const recipes = JSON.parse(JSON.stringify(recipeData));
    const ingredients = JSON.parse(JSON.stringify(ingredientCatalog));
    const packaging = JSON.parse(JSON.stringify(packagingCatalog));
    const finishedGoods = recipes.map(r => ({
      product: r.outputName,
      stock: 0,
      salePrice: r.salePrice,
      theoreticalCost: Number((computeRecipeCost(r, ingredients) / r.yieldPerBatch).toFixed(2)),
      yieldPerBatch: r.yieldPerBatch,
      shelfLifeDays: r.shelfLifeDays,
      labelType: r.labelType,
      lastProductionDate: null,
      nextExpiryDate: null,
    }));
    const customers = [
      { id: 1, businessName: 'Cliente mostrador', contactName: 'Cliente mostrador', email: 'cliente@correo.com', phone: '8180000000', orders: 0, totalSpent: 0 },
      { id: 2, businessName: 'Cafetería Roma', contactName: 'María López', email: 'compras@cafeteriaroma.com', phone: '8181112233', orders: 0, totalSpent: 0 },
      { id: 3, businessName: 'Oficina Centro', contactName: 'Recepción', email: 'recepcion@oficinacentro.com', phone: '8182223344', orders: 0, totalSpent: 0 },
    ];
    return { authenticated:false, activeTab:'dashboard', ingredients, packaging, recipes, finishedGoods, customers, movements:[{id:1,date:timestampNow(),type:'Inicial',product:'Sistema',detail:'Inventario inicial configurado',qty:0}], savedRemisiones:[], selectedRemision:null, notice:'', reportRange:'all' };
  }

  let state = loadState();
  function loadState(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return initialState();
      return { ...initialState(), ...JSON.parse(raw), authenticated:false, activeTab:'dashboard', selectedRemision:null, notice:'' };
    } catch { return initialState(); }
  }
  function persist(){
    const {authenticated, activeTab, selectedRemision, notice, ...toSave} = state;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  }
  function setNotice(msg){ state.notice = msg; render(); }

  function productionFormDefaults(){
    return { selectedRecipeId:'', batchCount:'1', productionDate: today() };
  }
  function inputFormDefaults(){
    return { ingredientName: state.ingredients[0]?.name || '', qty:'100', totalCost:'0', note:'Compra de insumos' };
  }
  function customerFormDefaults(){
    return { businessName:'', contactName:'', email:'', phone:'' };
  }
  function packagingFormDefaults(){
    return { name:'', stock:'', unitCost:'', reorderPoint:'' };
  }
  function orderDefaults(){
    const c = state.customers.find(c => String(c.id) === '1') || state.customers[0];
    return { selectedCustomerId: String(c?.id || ''), orderClient:c?.businessName || '', orderContact:c?.contactName || '', orderEmail:c?.email || '', orderPhone:c?.phone || '', orderNotes:'', orderItems:[{product: state.recipes[0]?.outputName || '', qty:1}] };
  }
  function newRecipeDefaults(){
    return { name:'', yieldPerBatch:'', salePrice:'', shelfLifeDays:'', labelType: state.packaging.filter(p => p.name !== 'BOLSA STANDARD')[0]?.name || '', rows:[{concept:'', quantity:''}] };
  }
  let ui = { ...productionFormDefaults(), ...inputFormDefaults(), ...customerFormDefaults(), ...packagingFormDefaults(), ...orderDefaults(), ...newRecipeDefaults(), wasteProduct: state.finishedGoods[0]?.product || state.recipes[0]?.outputName || '', wasteQty:'1', wasteReason:'Producto dañado', loginUser:'admin', loginPass:'galletas123', loginError:'', searchIngredient:'' };

  function resetUIAfterStateShift(){
    ui = { ...ui, ...inputFormDefaults(), ...orderDefaults(), wasteProduct: state.finishedGoods[0]?.product || '', selectedRecipeId:'', batchCount:'1', productionDate:today() };
  }

  function render(){
    const app = qs('#app');
    if (!state.authenticated) { app.innerHTML = loginHTML(); bindLogin(); return; }
    app.innerHTML = mainHTML();
    bindMain();
  }

  function loginHTML(){
    return `<div class="login-wrap"><div class="login-grid"><div class="login-hero"><div class="small" style="color:#cbd5e1;">SaaS Control Galletería</div><h1 style="margin:18px 0 0;font-size:42px;">Versión demo operativa</h1><div class="grid" style="grid-template-columns:1fr 1fr;margin-top:30px;"><div class="hero-box">Usuario demo: <strong>admin</strong></div><div class="hero-box">Contraseña demo: <strong>galletas123</strong></div></div></div><div class="login-card"><h2 style="margin-top:0;">Iniciar sesión</h2><p class="muted">Acceso único para el administrador</p><div class="stack"><div><label>Usuario</label><input id="loginUser" value="${ui.loginUser}"></div><div><label>Contraseña</label><input id="loginPass" type="password" value="${ui.loginPass}"></div>${ui.loginError ? `<div class="panel-lite" style="background:#fee2e2;color:#991b1b;">${ui.loginError}</div>` : ''}<button id="loginBtn">Entrar al sistema</button></div></div></div></div>`;
  }

  function calcDerived(){
    const lowStock = state.ingredients.filter(i => i.stock <= i.reorderPoint && i.reorderPoint > 0);
    const lowPackaging = state.packaging.filter(i => i.stock <= i.reorderPoint && i.reorderPoint > 0);
    const nearExpiry = state.finishedGoods.filter(i => i.nextExpiryDate && daysDiff(i.nextExpiryDate) <= 2);
    const totalFinishedUnits = state.finishedGoods.reduce((a,b)=>a+b.stock,0);
    const totalInsumosValue = state.ingredients.reduce((a,b)=>a + b.stock*b.unitCost,0) + state.packaging.reduce((a,b)=>a + b.stock*b.unitCost,0);
    const now = new Date();
    const filteredRemisiones = state.savedRemisiones.filter(r => {
      const date = new Date(r.date.replace(' ','T'));
      if (state.reportRange === 'today') return date.toDateString() === now.toDateString();
      if (state.reportRange === 'week') return (now - date)/(1000*60*60*24) <= 7;
      if (state.reportRange === 'month') return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
      return true;
    });
    const paid = filteredRemisiones.filter(r => r.paymentStatus === 'paid');
    const pending = filteredRemisiones.filter(r => r.paymentStatus !== 'paid');
    const totalSales = paid.reduce((a,b)=>a+b.total,0);
    const pendingCollect = pending.reduce((a,b)=>a+b.total,0);
    const avgTicket = paid.length ? totalSales / paid.length : 0;
    const totalCost = paid.reduce((acc, rem) => acc + rem.items.reduce((s,i)=>s + ((i.cost||0) * Number(i.qty||0)), 0),0);
    const totalProfit = paid.reduce((acc, rem) => acc + rem.items.reduce((s,i)=>s + (((i.price||0)-(i.cost||0)) * Number(i.qty||0)), 0),0);
    const salesByProduct = state.finishedGoods.map(fg => {
      const items = paid.flatMap(r => r.items.filter(i => i.product === fg.product));
      const qty = items.reduce((a,b)=>a+Number(b.qty||0),0);
      const costAccumulated = items.reduce((a,b)=>a + ((b.cost||0) * Number(b.qty||0)),0);
      const revenueAccumulated = items.reduce((a,b)=>a + ((b.price||0) * Number(b.qty||0)),0);
      return { product: fg.product, qty, costAccumulated, revenueAccumulated, profitAccumulated: revenueAccumulated - costAccumulated };
    }).filter(x => x.qty > 0).sort((a,b)=>b.qty-a.qty).slice(0,6);
    return { lowStock, lowPackaging, nearExpiry, totalFinishedUnits, totalInsumosValue, filteredRemisiones, paid, pending, totalSales, pendingCollect, avgTicket, totalCost, totalProfit, salesByProduct };
  }

  function bindMain(){
    qsa('[data-tab-btn]').forEach(btn => btn.onclick = () => { state.activeTab = btn.dataset.tabBtn; render(); });
    qs('#backupBtn').onclick = () => saveJSON({ ingredients:state.ingredients, packaging:state.packaging, finishedGoods:state.finishedGoods, customers:state.customers, movements:state.movements, savedRemisiones:state.savedRemisiones, recipes:state.recipes }, 'respaldo_saas_galletas.json');
    qs('#importBackup').onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          state.ingredients = parsed.ingredients || state.ingredients;
          state.packaging = parsed.packaging || state.packaging;
          state.finishedGoods = parsed.finishedGoods || state.finishedGoods;
          state.customers = parsed.customers || state.customers;
          state.movements = parsed.movements || state.movements;
          state.savedRemisiones = parsed.savedRemisiones || state.savedRemisiones;
          state.recipes = parsed.recipes || state.recipes;
          state.notice = 'Respaldo importado correctamente.';
          persist(); resetUIAfterStateShift(); render();
        } catch { alert('No fue posible leer el respaldo.'); }
      };
      reader.readAsText(file);
    };
    qs('#resetBtn').onclick = () => { state = initialState(); ui = { ...productionFormDefaults(), ...inputFormDefaults(), ...customerFormDefaults(), ...packagingFormDefaults(), ...orderDefaults(), ...newRecipeDefaults(), wasteProduct: state.finishedGoods[0]?.product || '', wasteQty:'1', wasteReason:'Producto dañado', loginUser:'admin', loginPass:'galletas123', loginError:'', searchIngredient:'' }; persist(); render(); };

    if (qs('#reportRange')) qs('#reportRange').onchange = e => { state.reportRange = e.target.value; render(); };

    if (qs('#selectedRecipeId')) qs('#selectedRecipeId').onchange = e => { ui.selectedRecipeId = e.target.value; render(); };
    if (qs('#batchCount')) qs('#batchCount').oninput = e => ui.batchCount = e.target.value;
    if (qs('#productionDate')) qs('#productionDate').oninput = e => ui.productionDate = e.target.value;
    if (qs('#saveProductionBtn')) qs('#saveProductionBtn').onclick = saveProduction;

    if (qs('#recipeName')) qs('#recipeName').oninput = e => ui.name = e.target.value;
    if (qs('#recipeYield')) qs('#recipeYield').oninput = e => ui.yieldPerBatch = e.target.value;
    if (qs('#recipeSale')) qs('#recipeSale').oninput = e => ui.salePrice = e.target.value;
    if (qs('#recipeShelf')) qs('#recipeShelf').oninput = e => ui.shelfLifeDays = e.target.value;
    if (qs('#recipeLabelType')) qs('#recipeLabelType').onchange = e => ui.labelType = e.target.value;
    qsa('[data-row-concept]').forEach(inp => inp.oninput = e => { ui.rows[Number(e.target.dataset.rowConcept)].concept = e.target.value; render(); });
    qsa('[data-row-qty]').forEach(inp => inp.oninput = e => { ui.rows[Number(e.target.dataset.rowQty)].quantity = e.target.value; render(); });
    qsa('[data-remove-row]').forEach(btn => btn.onclick = () => { const idx = Number(btn.dataset.removeRow); if (ui.rows.length > 1) ui.rows.splice(idx,1); render(); });
    if (qs('#addRecipeRowBtn')) qs('#addRecipeRowBtn').onclick = () => { ui.rows.push({ concept:'', quantity:'' }); render(); };
    if (qs('#saveRecipeTemplateBtn')) qs('#saveRecipeTemplateBtn').onclick = saveRecipeTemplate;

    if (qs('#wasteProduct')) qs('#wasteProduct').onchange = e => ui.wasteProduct = e.target.value;
    if (qs('#wasteQty')) qs('#wasteQty').oninput = e => ui.wasteQty = e.target.value;
    if (qs('#wasteReason')) qs('#wasteReason').oninput = e => ui.wasteReason = e.target.value;
    if (qs('#saveWasteBtn')) qs('#saveWasteBtn').onclick = saveWaste;

    if (qs('#entryIngredient')) qs('#entryIngredient').onchange = e => ui.ingredientName = e.target.value;
    if (qs('#entryQty')) qs('#entryQty').oninput = e => ui.qty = e.target.value;
    if (qs('#entryTotalCost')) qs('#entryTotalCost').oninput = e => ui.totalCost = e.target.value;
    if (qs('#entryNote')) qs('#entryNote').oninput = e => ui.note = e.target.value;
    if (qs('#entrySaveBtn')) qs('#entrySaveBtn').onclick = saveEntry;

    if (qs('#pkgName')) qs('#pkgName').oninput = e => ui.pkgName = e.target.value;
    if (qs('#pkgStock')) qs('#pkgStock').oninput = e => ui.pkgStock = e.target.value;
    if (qs('#pkgCost')) qs('#pkgCost').oninput = e => ui.pkgCost = e.target.value;
    if (qs('#pkgMin')) qs('#pkgMin').oninput = e => ui.pkgMin = e.target.value;
    if (qs('#addPackagingBtn')) qs('#addPackagingBtn').onclick = addPackaging;
    qsa('[data-pkg-stock]').forEach(inp => inp.oninput = e => updatePackaging(Number(e.target.dataset.pkgStock), 'stock', e.target.value));
    qsa('[data-pkg-cost]').forEach(inp => inp.oninput = e => updatePackaging(Number(e.target.dataset.pkgCost), 'unitCost', e.target.value));
    qsa('[data-pkg-del]').forEach(btn => btn.onclick = () => deletePackaging(Number(btn.dataset.pkgDel)));

    if (qs('#ingredientSearch')) qs('#ingredientSearch').oninput = e => { ui.searchIngredient = e.target.value; render(); };
    qsa('[data-ing-stock]').forEach(inp => inp.oninput = e => updateIngredient(e.target.dataset.ingStock, 'stock', e.target.value));
    qsa('[data-ing-cost]').forEach(inp => inp.oninput = e => updateIngredient(e.target.dataset.ingCost, 'unitCost', e.target.value));

    if (qs('#selectedCustomer')) qs('#selectedCustomer').onchange = e => selectCustomer(e.target.value);
    if (qs('#orderClient')) qs('#orderClient').oninput = e => ui.orderClient = e.target.value;
    if (qs('#orderContact')) qs('#orderContact').oninput = e => ui.orderContact = e.target.value;
    if (qs('#orderEmail')) qs('#orderEmail').oninput = e => ui.orderEmail = e.target.value;
    if (qs('#orderPhone')) qs('#orderPhone').oninput = e => ui.orderPhone = e.target.value;
    if (qs('#orderNotes')) qs('#orderNotes').oninput = e => ui.orderNotes = e.target.value;
    qsa('[data-order-product]').forEach(inp => inp.onchange = e => { ui.orderItems[Number(e.target.dataset.orderProduct)].product = e.target.value; render(); });
    qsa('[data-order-qty]').forEach(inp => inp.oninput = e => { ui.orderItems[Number(e.target.dataset.orderQty)].qty = Number(e.target.value) || 0; render(); });
    qsa('[data-order-remove]').forEach(btn => btn.onclick = () => { if (ui.orderItems.length > 1) ui.orderItems.splice(Number(btn.dataset.orderRemove),1); render(); });
    if (qs('#addOrderLineBtn')) qs('#addOrderLineBtn').onclick = () => { ui.orderItems.push({ product: state.recipes[0]?.outputName || '', qty:1 }); render(); };
    if (qs('#generateOrderBtn')) qs('#generateOrderBtn').onclick = generateOrder;
    if (qs('#printRemisionBtn')) qs('#printRemisionBtn').onclick = () => state.selectedRemision && printWindow(remisionHtml(state.selectedRemision), state.selectedRemision.folio);

    qsa('[data-rem-view]').forEach(btn => btn.onclick = () => viewRemision(btn.dataset.remView));

    if (qs('#customerBusiness')) qs('#customerBusiness').oninput = e => ui.businessName = e.target.value;
    if (qs('#customerContact')) qs('#customerContact').oninput = e => ui.contactName = e.target.value;
    if (qs('#customerEmail')) qs('#customerEmail').oninput = e => ui.email = e.target.value;
    if (qs('#customerPhone')) qs('#customerPhone').oninput = e => ui.phone = e.target.value;
    if (qs('#addCustomerBtn')) qs('#addCustomerBtn').onclick = addCustomer;

    qsa('[data-pay-toggle]').forEach(btn => btn.onclick = () => togglePayment(btn.dataset.payToggle, btn.dataset.payStatus));

    if (qs('#exportSalesBtn')) qs('#exportSalesBtn').onclick = reportSales;
    if (qs('#reportSalesBtn')) qs('#reportSalesBtn').onclick = reportSales;
    if (qs('#reportInventoryBtn')) qs('#reportInventoryBtn').onclick = reportInventory;
    if (qs('#reportCustomersBtn')) qs('#reportCustomersBtn').onclick = reportCustomers;
  }

  function selectCustomer(id){
    ui.selectedCustomerId = id;
    const c = state.customers.find(x => String(x.id) === String(id));
    if (c) { ui.orderClient = c.businessName; ui.orderContact = c.contactName; ui.orderEmail = c.email; ui.orderPhone = c.phone; }
    render();
  }

  function updateIngredient(name, field, value){
    const num = Number(value);
    state.ingredients = state.ingredients.map(i => i.name === name ? { ...i, [field]: Number.isFinite(num) ? num : i[field] } : i);
    persist(); render();
  }
  function updatePackaging(id, field, value){
    const num = Number(value);
    state.packaging = state.packaging.map(i => i.id === id ? { ...i, [field]: Number.isFinite(num) ? num : i[field] } : i);
    persist(); render();
  }
  function deletePackaging(id){
    state.packaging = state.packaging.filter(i => i.id !== id);
    state.notice = 'Registro de etiqueta o bolsa eliminado.';
    persist(); render();
  }

  function addPackaging(){
    if (!String(ui.pkgName || '').trim()) return;
    state.packaging.push({ id: Date.now(), name: String(ui.pkgName).trim().toUpperCase(), unitBase:'pza', stock:Number(ui.pkgStock)||0, unitCost:Number(ui.pkgCost)||0, reorderPoint:Number(ui.pkgMin)||0 });
    ui.pkgName=''; ui.pkgStock=''; ui.pkgCost=''; ui.pkgMin='';
    state.notice = 'Etiqueta o bolsa agregada correctamente.';
    persist(); render();
  }

  function saveEntry(){
    const qty = Number(ui.qty) || 0;
    const totalCost = Number(ui.totalCost) || 0;
    if (qty <= 0) return;
    state.ingredients = state.ingredients.map(item => {
      if (item.name !== ui.ingredientName) return item;
      const currentStock = Number(item.stock) || 0;
      const currentValue = currentStock * (Number(item.unitCost) || 0);
      const newTotalStock = currentStock + qty;
      const newTotalValue = currentValue + totalCost;
      const averagedUnitCost = newTotalStock > 0 ? newTotalValue / newTotalStock : item.unitCost;
      return { ...item, stock: Number(newTotalStock.toFixed(2)), unitCost: Number(averagedUnitCost.toFixed(4)) };
    });
    state.movements.unshift({ id: state.movements.length+1, date: timestampNow(), type:'Entrada insumo', product: ui.ingredientName, detail:`${ui.note || 'Entrada manual de almacén'} · costo total ${currency(totalCost)}`, qty });
    ui = { ...ui, ...inputFormDefaults() };
    state.notice = 'Entrada de insumo registrada.';
    persist(); render();
  }

  function saveRecipeTemplate(){
    const name = String(ui.name || '').trim();
    if (!name) return;
    const rows = ui.rows.filter(r => String(r.concept||'').trim() && Number(r.quantity||0) > 0).map(r => [String(r.concept).trim().toUpperCase(), Number(r.quantity)]);
    const recipe = { id:name.toUpperCase(), outputName:name.toUpperCase(), yieldPerBatch:Number(ui.yieldPerBatch)||1, salePrice:Number(ui.salePrice)||0, shelfLifeDays:Number(ui.shelfLifeDays)||5, labelType: ui.labelType || state.packaging.filter(p => p.name !== 'BOLSA STANDARD')[0]?.name || 'ETIQUETA CLASSIC', ingredients: rows };
    state.recipes.push(recipe);
    state.finishedGoods.push({ product: recipe.outputName, stock:0, salePrice:recipe.salePrice, theoreticalCost:Number((computeRecipeCost(recipe, state.ingredients)/recipe.yieldPerBatch).toFixed(2)), yieldPerBatch:recipe.yieldPerBatch, shelfLifeDays:recipe.shelfLifeDays, labelType:recipe.labelType, lastProductionDate:null, nextExpiryDate:null });
    ui = { ...ui, ...newRecipeDefaults() };
    state.notice = 'Plantilla de receta creada.';
    persist(); render();
  }

  function saveProduction(){
    const recipe = state.recipes.find(r => r.id === ui.selectedRecipeId);
    if (!recipe) return;
    const lots = Math.max(1, Number(ui.batchCount) || 1);
    const reqIng = recipe.ingredients.map(([name, qty]) => ({ name, needed: qty * lots, stock: state.ingredients.find(i => i.name === name)?.stock || 0 }));
    const reqBag = { name:'BOLSA STANDARD', needed: recipe.yieldPerBatch * lots, stock: state.packaging.find(p => p.name === 'BOLSA STANDARD')?.stock || 0 };
    const reqLabel = { name: recipe.labelType, needed: recipe.yieldPerBatch * 2 * lots, stock: state.packaging.find(p => p.name === recipe.labelType)?.stock || 0 };
    const insufficient = [...reqIng, reqBag, reqLabel].filter(x => x.stock < x.needed);
    if (insufficient.length) return alert(`No hay inventario suficiente para: ${insufficient.map(i=>i.name).join(', ')}`);
    state.ingredients = state.ingredients.map(item => {
      const req = reqIng.find(r => r.name === item.name);
      return req ? { ...item, stock: Number((item.stock - req.needed).toFixed(2)) } : item;
    });
    state.packaging = state.packaging.map(item => {
      if (item.name === 'BOLSA STANDARD') return { ...item, stock: Number((item.stock - reqBag.needed).toFixed(2)) };
      if (item.name === recipe.labelType) return { ...item, stock: Number((item.stock - reqLabel.needed).toFixed(2)) };
      return item;
    });
    const produced = recipe.yieldPerBatch * lots;
    const expiry = addDays(ui.productionDate, recipe.shelfLifeDays);
    state.finishedGoods = state.finishedGoods.map(item => item.product === recipe.outputName ? { ...item, stock:item.stock + produced, theoreticalCost:Number((computeRecipeCost(recipe, state.ingredients)/recipe.yieldPerBatch).toFixed(2)), lastProductionDate:ui.productionDate, nextExpiryDate:expiry, labelType:recipe.labelType } : item);
    state.movements.unshift({ id: state.movements.length+1, date: timestampNow(), type:'Producción', product: recipe.outputName, detail:`${lots} lote(s) · ${produced} pzas · elaboración ${ui.productionDate} · vence ${expiry} · ${recipe.labelType}`, qty: produced });
    state.notice = 'Producción registrada. Ya se reflejó en reportes.';
    ui.selectedRecipeId=''; ui.batchCount='1';
    persist(); render();
  }

  function saveWaste(){
    const qty = Number(ui.wasteQty) || 0;
    const fg = state.finishedGoods.find(f => f.product === ui.wasteProduct);
    if (!fg || qty <= 0 || fg.stock < qty) return alert('No hay suficiente producto terminado para registrar la merma.');
    state.finishedGoods = state.finishedGoods.map(f => f.product === ui.wasteProduct ? { ...f, stock: f.stock - qty } : f);
    state.movements.unshift({ id: state.movements.length+1, date: timestampNow(), type:'Merma', product: ui.wasteProduct, detail: ui.wasteReason || 'Merma de producto terminado', qty: -qty });
    ui.wasteQty='1';
    persist(); render();
  }

  function generateOrder(){
    const invalid = ui.orderItems.filter(item => {
      const stock = state.finishedGoods.find(f => f.product === item.product)?.stock || 0;
      return !item.product || Number(item.qty||0) <= 0 || stock < Number(item.qty||0);
    });
    if (invalid.length) return alert('Revisa las cantidades. Hay productos sin stock suficiente o líneas inválidas.');
    const remision = {
      folio:`REM-${Date.now().toString().slice(-6)}`,
      date: timestampNow(),
      client: ui.orderClient,
      contact: ui.orderContact,
      email: ui.orderEmail,
      phone: ui.orderPhone,
      customerId: Number(ui.selectedCustomerId),
      notes: ui.orderNotes,
      paymentStatus:'pending',
      items: ui.orderItems.map(item => {
        const fg = state.finishedGoods.find(f => f.product === item.product);
        const qty = Number(item.qty || 0);
        return { product:item.product, qty, price:fg?.salePrice || 0, subtotal:(fg?.salePrice || 0) * qty, expiry:fg?.nextExpiryDate, elaboration:fg?.lastProductionDate, cost:fg?.theoreticalCost || 0, labelType:fg?.labelType || 'N/D' };
      }),
      total: ui.orderItems.reduce((acc,item) => acc + ((state.finishedGoods.find(f => f.product === item.product)?.salePrice || 0) * Number(item.qty||0)), 0)
    };
    state.finishedGoods = state.finishedGoods.map(fg => {
      const line = ui.orderItems.find(item => item.product === fg.product);
      return line ? { ...fg, stock: fg.stock - Number(line.qty) } : fg;
    });
    state.savedRemisiones.unshift(remision);
    state.selectedRemision = remision;
    state.customers = state.customers.map(c => c.id === Number(ui.selectedCustomerId) ? { ...c, orders: c.orders + 1, businessName: ui.orderClient, contactName: ui.orderContact, email: ui.orderEmail, phone: ui.orderPhone } : c);
    ui = { ...ui, ...orderDefaults() };
    state.notice = 'Salida registrada y remisión generada.';
    persist(); render();
  }

  function remisionHtml(remision){
    const rows = remision.items.map(item => `<tr><td style="border:1px solid #ddd;padding:8px;">${item.product}</td><td style="border:1px solid #ddd;padding:8px;">${item.qty}</td><td style="border:1px solid #ddd;padding:8px;">${item.labelType}</td><td style="border:1px solid #ddd;padding:8px;">${currency(item.price)}</td><td style="border:1px solid #ddd;padding:8px;">${currency(item.subtotal)}</td></tr>`).join('');
    return `<h2>Remisión ${remision.folio}</h2><p>Fecha: ${remision.date}</p><p>Cliente: ${remision.client}</p><p>Contacto: ${remision.contact || ''}</p><p>Correo: ${remision.email || ''}</p><p>Teléfono: ${remision.phone || ''}</p><p>Estatus: ${remision.paymentStatus === 'paid' ? 'Pagado' : 'Pendiente'}</p><table style="border-collapse:collapse;width:100%;margin-top:16px;"><thead><tr><th style="border:1px solid #ddd;padding:8px;">Producto</th><th style="border:1px solid #ddd;padding:8px;">Pzas</th><th style="border:1px solid #ddd;padding:8px;">Etiqueta receta</th><th style="border:1px solid #ddd;padding:8px;">Precio</th><th style="border:1px solid #ddd;padding:8px;">Subtotal</th></tr></thead><tbody>${rows}</tbody></table><h3 style="margin-top:16px;">Total: ${currency(remision.total)}</h3>`;
  }

  function viewRemision(folio){
    const rem = state.savedRemisiones.find(r => r.folio === folio);
    if (!rem) return;
    state.selectedRemision = rem;
    state.notice = `Remisión ${rem.folio} abierta.`;
    state.activeTab = 'remisiones';
    render();
  }

  function addCustomer(){
    if (!String(ui.businessName || '').trim()) return;
    state.customers.push({ id: Date.now(), businessName: ui.businessName, contactName: ui.contactName, email: ui.email, phone: ui.phone, orders: 0, totalSpent: 0 });
    ui.businessName=''; ui.contactName=''; ui.email=''; ui.phone='';
    state.notice = 'Cliente agregado correctamente.';
    persist(); render();
  }

  function togglePayment(folio, status){
    const target = state.savedRemisiones.find(r => r.folio === folio);
    if (!target) return;
    state.savedRemisiones = state.savedRemisiones.map(r => r.folio === folio ? { ...r, paymentStatus: status } : r);
    if (status === 'paid' && target.paymentStatus !== 'paid') {
      state.customers = state.customers.map(c => c.id === target.customerId ? { ...c, totalSpent: c.totalSpent + target.total } : c);
    }
    if (status === 'pending' && target.paymentStatus === 'paid') {
      state.customers = state.customers.map(c => c.id === target.customerId ? { ...c, totalSpent: Math.max(0, c.totalSpent - target.total) } : c);
    }
    state.notice = `Cobranza actualizada a ${status === 'paid' ? 'pagado' : 'pendiente'}.`;
    persist(); render();
  }

  function reportSales(){
    const d = calcDerived();
    const rows = [['Folio','Fecha','Cliente','Estatus','Productos','Piezas','Total']].concat(d.filteredRemisiones.map(r => [r.folio, r.date, r.client, r.paymentStatus, r.items.map(i=>i.product).join(' | '), r.items.reduce((s,i)=>s+Number(i.qty),0), r.total]));
    csvWindow(rows, 'reporte_ventas.csv');
  }
  function reportInventory(){
    const rows = [['Producto','Stock','Costo unitario','Valor']].concat(state.finishedGoods.map(item => [item.product, item.stock, item.theoreticalCost, Number((item.stock * item.theoreticalCost).toFixed(2))]));
    csvWindow(rows, 'reporte_inventario.csv');
  }
  function reportCustomers(){
    const rows = [['Negocio','Contacto','Correo','Teléfono','Pedidos','Total cobrado']].concat(state.customers.map(c => [c.businessName, c.contactName, c.email, c.phone, c.orders, c.totalSpent]));
    csvWindow(rows, 'clientes.csv');
  }

  render();
})();
</script>
</body>
</html>
